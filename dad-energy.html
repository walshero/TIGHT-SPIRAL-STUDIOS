<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dad Energy: A Father's Day Game</title><style>
  :root{
    --paper:#0c0f14;            /* deep slate page (matches cut-paper night) */
    --panel:#16202c;            /* card surface — slate */
    --ink:#e8d9bc;             /* warm cream text */
    --ink-soft:#8aa0b4;        /* muted slate-blue */
    --tape:#243140;
    --marker:#e0a857;          /* warm amber accent */
    --marker-deep:#f4d089;     /* bright amber */
    --warn:#d98a5a;            /* terracotta accent */
    --line:#2a3a4a;            /* hairline borders — slate */
    --focus:#f4d089;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--paper);color:var(--ink);font-family:"Source Serif 4",Georgia,serif;
    font-size:clamp(18px,2.4vw,22px);line-height:1.55;min-height:100vh;
    display:flex;align-items:flex-start;justify-content:center;padding:clamp(16px,4vw,48px);}
  .card{background:var(--panel);border:2px solid #1d3328;border-radius:14px;
    box-shadow:0 0 0 1px rgba(224,168,87,.08), inset 0 0 70px rgba(224,168,87,.05), 0 18px 50px rgba(0,0,0,.5);
    max-width:700px;width:100%;padding:clamp(24px,5vw,48px);position:relative;overflow:hidden;}
  .card::after{ /* CRT scanlines over everything */
    content:"";position:absolute;inset:0;pointer-events:none;z-index:5;border-radius:12px;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0px,rgba(0,0,0,0) 2px,rgba(0,0,0,.04) 3px,rgba(0,0,0,0) 4px);}
  .eyebrow{font-family:"Caveat",cursive;font-size:clamp(26px,4vw,34px);color:var(--marker);margin:0 0 2px;line-height:1;position:relative;z-index:6;text-shadow:0 0 8px rgba(224,168,87,.45);}
  h1{font-weight:700;font-size:clamp(28px,5vw,40px);margin:0 0 18px;letter-spacing:-.01em;position:relative;z-index:6;color:var(--marker-deep);text-shadow:0 0 6px rgba(224,168,87,.4),3px 3px 0 rgba(255,200,87,.25);}
  .art-block{margin:6px 0 22px;position:relative;z-index:6;}
  .art{width:100%;border:1px solid var(--line);border-radius:10px 10px 0 0;background:#0d130e;display:block;border-bottom:none;box-shadow:inset 0 0 40px rgba(224,168,87,.06);}
  .art svg{display:block;width:100%;height:auto;max-height:46vh;}
  .art-caption{font-family:"Caveat",cursive;font-size:clamp(22px,4.5vw,30px);line-height:1.15;color:var(--marker);text-align:center;
    background:#0d130e;border:1px solid var(--line);border-top:1px dashed var(--line);border-radius:0 0 10px 10px;padding:8px 14px 12px;margin:0;text-shadow:0 0 8px rgba(224,168,87,.4);}
  .art-caption.warn{color:var(--warn);text-shadow:0 0 8px rgba(255,200,87,.4);}
  .meter-wrap{margin:18px 0 26px;position:relative;z-index:6;}
  .meter-label{display:flex;justify-content:space-between;align-items:baseline;font-size:.8em;color:var(--ink-soft);margin-bottom:6px;letter-spacing:.08em;text-transform:uppercase;}
  .meter-label b{color:var(--marker-deep);font-family:"Caveat",cursive;font-size:1.5em;text-transform:none;letter-spacing:0;text-shadow:0 0 8px rgba(224,168,87,.5);}
  .meter{height:16px;background:#0a120c;border-radius:99px;overflow:hidden;border:1px solid var(--line);}
  .meter-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--marker),var(--marker-deep));border-radius:99px;transition:width .55s ease;box-shadow:0 0 12px rgba(224,168,87,.6);}
  .meter-fill.climb{transition:width 1.15s cubic-bezier(.34,1.56,.64,1);}
  @media (prefers-reduced-motion: reduce){.meter-fill,.meter-fill.climb{transition:none;}}
  .scene{font-size:1.05em;position:relative;z-index:6;color:#e8d9bc;}
  .scene p{margin:0 0 1em;}
  .narrator{color:var(--warn);font-style:italic;text-shadow:0 0 6px rgba(255,200,87,.25);}
  .options{display:flex;flex-direction:column;gap:14px;margin-top:26px;position:relative;z-index:6;}
  button.choice{font-family:"Source Serif 4",serif;font-size:1em;text-align:left;background:transparent;color:#e8d9bc;
    border:2px solid var(--ink);border-radius:10px;padding:16px 18px;cursor:pointer;line-height:1.4;transition:transform .08s ease, background .15s ease, box-shadow .15s ease;}
  button.choice:hover{background:rgba(224,168,87,.10);transform:translateY(-1px);box-shadow:0 0 16px rgba(224,168,87,.2);}
  button.choice:active{transform:translateY(0);}
  button.choice:focus-visible,button.next:focus-visible,button.restart:focus-visible{outline:4px solid var(--focus);outline-offset:2px;}
  .feedback{margin-top:8px;padding:16px 18px;border-left:5px solid var(--marker);background:rgba(224,168,87,.07);border-radius:0 10px 10px 0;font-size:1em;position:relative;z-index:6;color:#e8d9bc;}
  .feedback.zing{border-left-color:var(--warn);background:rgba(255,200,87,.08);}
  .feedback .tag{display:block;font-family:"Caveat",cursive;font-size:1.5em;line-height:1;color:var(--marker-deep);margin-bottom:2px;text-shadow:0 0 8px rgba(224,168,87,.4);}
  .feedback.zing .tag{color:var(--warn);text-shadow:0 0 8px rgba(255,200,87,.4);}
  .next-row{margin-top:24px;display:flex;gap:12px;flex-wrap:wrap;position:relative;z-index:6;}
  button.next{font-family:"Source Serif 4",serif;font-weight:700;font-size:1em;letter-spacing:.06em;text-transform:uppercase;background:transparent;color:var(--marker);
    border:2px solid var(--marker);border-radius:10px;padding:14px 26px;cursor:pointer;transition:background .15s ease;text-shadow:0 0 8px rgba(224,168,87,.4);box-shadow:0 0 14px rgba(224,168,87,.15);}
  button.next:hover{background:rgba(224,168,87,.14);}
  .step-count{font-size:.78em;color:var(--ink-soft);margin-top:24px;position:relative;z-index:6;letter-spacing:.08em;text-transform:uppercase;}
  .ending h1{margin-bottom:6px;}
  .rank{font-family:"Caveat",cursive;font-size:clamp(34px,6vw,52px);color:var(--marker-deep);line-height:1;margin:4px 0 14px;text-shadow:0 0 12px rgba(224,168,87,.5);}
  button.restart{font-family:"Source Serif 4",serif;font-weight:700;font-size:1em;letter-spacing:.06em;text-transform:uppercase;background:transparent;color:var(--marker);
    border:2px solid var(--marker);border-radius:10px;padding:14px 24px;cursor:pointer;margin-top:10px;text-shadow:0 0 8px rgba(224,168,87,.4);}
  button.restart:hover{background:rgba(224,168,87,.14);}
  .hint{font-size:.8em;color:var(--ink-soft);margin-top:30px;border-top:1px dashed var(--line);padding-top:14px;position:relative;z-index:6;}
  .brand{margin-top:18px;text-align:center;font-size:.82em;color:var(--ink-soft);position:relative;z-index:6;}
  .brand .studio{font-family:"Caveat",cursive;font-size:1.6em;color:var(--marker);display:block;line-height:1;text-shadow:0 0 8px rgba(224,168,87,.4);}
  .brand a{color:var(--marker-deep);text-decoration:none;border-bottom:1px solid var(--line);}
  .brand a:focus-visible{outline:4px solid var(--focus);outline-offset:2px;}
  @media (prefers-reduced-motion: reduce){*{transition:none !important;}}

  /* ---- between-scene castle build interstitial ---- */
  .build-wrap{position:relative;z-index:6;text-align:center;}
  .build-cap{font-family:"Caveat",cursive;font-size:clamp(24px,5vw,34px);color:var(--marker);
    text-shadow:0 0 8px rgba(224,168,87,.4);margin:0 0 4px;line-height:1.1;}
  .build-sub{color:var(--ink-soft);font-size:.82em;letter-spacing:.08em;text-transform:uppercase;margin:0 0 14px;}
  .build-art{border:1px solid var(--line);border-radius:10px;background:#0d130e;box-shadow:inset 0 0 40px rgba(224,168,87,.06);}
  .build-art svg{display:block;width:100%;height:auto;max-height:46vh;}
  /* newest piece draws itself in via stroke-dash; older pieces are already solid */
  .bnew path,.bnew g{stroke-dasharray:600;stroke-dashoffset:600;animation:draw 1.1s ease forwards;}
  .bnew .bfill{opacity:0;animation:fadein .5s ease .9s forwards;}
  @keyframes draw{to{stroke-dashoffset:0;}}
  @keyframes fadein{to{opacity:1;}}
  @media (prefers-reduced-motion: reduce){
    .bnew path,.bnew g{stroke-dashoffset:0;animation:none;}
    .bnew .bfill{opacity:1;animation:none;}
  }
  .build-row{margin-top:20px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center;position:relative;z-index:6;}
  button.replaybtn{font-family:"Source Serif 4",serif;font-weight:700;font-size:.92em;letter-spacing:.06em;text-transform:uppercase;
    background:transparent;color:var(--ink-soft);border:2px solid var(--line);border-radius:10px;padding:12px 20px;cursor:pointer;}
  button.replaybtn:hover{background:rgba(224,168,87,.08);color:var(--marker);}
  button.replaybtn:focus-visible{outline:4px solid var(--focus);outline-offset:2px;}

  /* ---- retro arcade title screen (intro only) ---- */
  .arcade{
    background:#16202c;
    border-radius:12px;
    margin:-2px 0 0;
    padding:clamp(28px,7vw,56px) clamp(20px,5vw,40px);
    text-align:center;
    position:relative;
    overflow:hidden;
    border:2px solid #2a3a4a;
    box-shadow:inset 0 0 60px rgba(224,168,87,.08);
  }
  .arcade::after{ /* CRT scanlines */
    content:"";position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0px,rgba(0,0,0,0) 2px,rgba(0,0,0,.04) 3px,rgba(0,0,0,0) 4px);
    border-radius:12px;
  }
  .arcade-tag{
    font-family:"Caveat",cursive;font-size:clamp(16px,3.4vw,22px);
    color:#e0a857;letter-spacing:.12em;text-transform:uppercase;margin:0 0 10px;
    text-shadow:0 0 8px rgba(224,168,87,.5);
  }
  .arcade-title{
    font-family:"Source Serif 4",serif;font-weight:700;
    font-size:clamp(40px,11vw,84px);line-height:.92;margin:0;
    color:#f4d089;letter-spacing:-.02em;
    text-shadow:0 0 4px rgba(224,168,87,.6),0 0 22px rgba(224,168,87,.35),4px 4px 0 #B4582A;
  }
  .arcade-sub{
    font-family:"Caveat",cursive;font-size:clamp(24px,5.5vw,38px);
    color:#FFC857;margin:6px 0 0;line-height:1;
    text-shadow:0 0 10px rgba(255,200,87,.4);
  }
  .arcade-pitch{
    color:#e8d9bc;font-size:clamp(15px,3.4vw,18px);line-height:1.5;
    max-width:30em;margin:22px auto 0;position:relative;z-index:1;
  }
  .arcade-pitch .dare{color:#FFC857;font-style:italic;}
  .arcade-start{
    margin-top:26px;position:relative;z-index:1;
    font-family:"Source Serif 4",serif;font-weight:700;font-size:clamp(16px,3.6vw,20px);
    letter-spacing:.16em;text-transform:uppercase;
    background:transparent;color:#f4d089;border:2px solid #e0a857;border-radius:8px;
    padding:14px 28px;cursor:pointer;
    text-shadow:0 0 8px rgba(224,168,87,.5);box-shadow:0 0 16px rgba(224,168,87,.18);
    animation:presspulse 1.4s ease-in-out infinite;
  }
  .arcade-start:hover{background:rgba(224,168,87,.12);}
  .arcade-start:focus-visible{outline:4px solid #FFC857;outline-offset:3px;}
  @keyframes presspulse{0%,100%{opacity:1}50%{opacity:.55}}
  @media (prefers-reduced-motion: reduce){.arcade-start{animation:none;}}
  .arcade-foot{
    margin-top:20px;position:relative;z-index:1;
    font-family:"Caveat",cursive;font-size:clamp(15px,3.2vw,19px);color:#6B9C82;
  }

  /* Persistent nav — fixed corner, present on every screen (NAV FLOOR) */
  .studio-nav{position:fixed;top:12px;left:12px;z-index:50;display:flex;gap:8px;}
  .studio-nav button{font-family:"Source Serif 4",Georgia,serif;font-size:15px;font-weight:700;
    letter-spacing:.04em;background:#16202c;color:#e8d9bc;border:2px solid #e8d9bc;
    border-radius:10px;min-height:44px;min-width:44px;padding:0 14px;cursor:pointer;
    line-height:1;display:inline-flex;align-items:center;gap:6px;box-shadow:0 4px 14px rgba(0,0,0,.45);}
  .studio-nav button:hover{background:rgba(224,168,87,.14);}
  .studio-nav button:focus-visible{outline:4px solid var(--focus);outline-offset:2px;}
  .studio-nav button[disabled]{opacity:.32;cursor:default;}
  @media (max-width:480px){.studio-nav button{font-size:14px;padding:0 11px;}}

  /* comfort knob — corner control (studio floor 1). Cycles to a calmer, low-glow mode. */
  .comfort-knob{position:fixed;top:12px;right:12px;z-index:50;
    font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px;font-weight:700;line-height:1;
    padding:9px 12px;border:2px solid var(--ink);border-radius:10px;
    background:var(--panel);color:var(--ink);cursor:pointer;min-height:44px;}
  .comfort-knob:focus-visible{outline:4px solid var(--focus);outline-offset:2px;}
  /* softer = calm mode: drop the neon glow and the pulse (visual-comfort tuning, palette unchanged) */
  body.softer .eyebrow, body.softer h1, body.softer .art-caption, body.softer .rank,
  body.softer .meter-label b, body.softer .feedback .tag, body.softer button.next,
  body.softer button.restart, body.softer .build-cap, body.softer .brand .studio,
  body.softer .arcade-title, body.softer .arcade-sub, body.softer .arcade-tag,
  body.softer .arcade-start{text-shadow:none !important;box-shadow:none !important;}
  body.softer .meter-fill{box-shadow:none !important;}
  body.softer *{animation:none !important;}
  </style>
</head>
<body>
  <nav class="studio-nav" aria-label="Game navigation">
    <button id="navBack" type="button" aria-label="Back one screen">← Back</button>
    <button id="navHome" type="button" aria-label="Back to start">⌂ Home</button>
  </nav>
  <button class="comfort-knob" id="comfortBtn" aria-label="Switch comfort mode" aria-live="polite">Comfort: Default</button>
  <main class="card" id="card" role="application" aria-label="Dad Energy, a Father's Day game"></main>
<script>

    showTop();var btns=card.querySelectorAll("button.choice");btns.forEach(function(b){b.addEventListener("click",function(){choose(parseInt(b.dataset.i,10));});});if(btns[0])focusTop(btns[0]);}

    // 3 — flag + drawbridge + the door (after the stall, just before unveiling)
    {cap:"By dusk, it's a castle.",sub:"almost showtime \u00b7 one promise, kept",
     svg:'<path d="M90 196 q210 -7 420 0" '+G+'/><path d="M120 196 q-1 -10 0 -18 q180 -5 360 0 q1 9 0 18" '+G+' stroke-width="2.4"/><path d="M132 178 q-2 -44 0 -84 q174 -5 336 0 q2 40 0 84" '+G+'/><path d="M126 96 q-2 -22 0 -40 q26 -2 50 0 q1 18 0 40 M424 96 q2 -22 0 -40 q26 -2 50 0 q1 18 0 40" '+G+'/><path d="M126 56 v-14 h14 v14 m22 0 v-14 h14 v14 M424 56 v-14 h14 v14 m22 0 v-14 h14 v14" '+G+' stroke-width="2.2"/><path class="bfill" d="M252 178 q-2 -30 0 -52 q48 -2 96 1 q1 25 -1 51 q-48 3 -95 0z" fill="#e0a857" stroke="none"/><path d="M300 50 v-30 l34 9 l-32 11" fill="#FFC857" stroke="#FFC857" stroke-width="2" stroke-linejoin="round" class="bfill"/><path d="M300 20 q-1 64 0 158" stroke="#e0a857" stroke-width="2.2" fill="none"/>'}
  ];

  function renderBuild(sceneIdx){
    // sceneIdx is the scene we're ABOUT to play (1..4). The build beat is sceneIdx-1 (0..3).
    var beat=sceneIdx-1; if(beat<0)beat=0; if(beat>castleLayers.length-1)beat=castleLayers.length-1;
    drawBuild(beat);
  }
  function drawBuild(beat){
    var L=castleLayers[beat];
    // wrap the whole svg-inner in .bnew so the freshest version animates; simplest reliable approach:
    card.innerHTML='<div class="build-wrap"><p class="build-cap">'+L.cap+'</p><p class="build-sub">'+L.sub+'</p>'
      +'<div class="build-art"><svg viewBox="0 0 600 210" role="img" aria-label="The castle, being built" preserveAspectRatio="xMidYMid meet"><g class="bnew">'+L.svg+'</g></svg></div>'
      +'<div class="build-row"><button class="next" id="contBtn">Continue</button><button class="replaybtn" id="rebuildBtn">\u21ba Replay</button></div></div>';
    showTop();
    var c=document.getElementById("contBtn");c.addEventListener("click",renderScene);
    var r=document.getElementById("rebuildBtn");r.addEventListener("click",function(){drawBuild(beat);});
    focusTop(c);
  }

  function renderEnding(){var end=endings[0];for(var k=0;k<endings.length;k++){if(promise>=endings[k].min)end=endings[k];}
    card.innerHTML='<div class="ending"><p class="eyebrow">8:45 p.m. — the couch</p><h1>The castle held.</h1>'+artBlock(end.img,end.cap,end.capWarn)+endMeterHTML()+'<p class="rank">'+end.rank+'</p><p>'+end.blurb+'</p><p class="narrator">Greg the pancake did not survive the day. He is survived by the castle, and by you.</p><button class="restart" id="again">Play the day again</button></div><p class="hint">There are no wrong moves in here — only different ways a promise comes true. Happy Father'+"'"+'s Day.</p><div class="brand"><span class="studio">Tight Spiral Studios</span>Play. Notice. Design. &nbsp;·&nbsp; <a href="mailto:walshero@gmail.com">walshero@gmail.com</a></div>';
    showTop();var a=document.getElementById("again");a.addEventListener("click",function(){renderIntro();});focusTop(a);animateEndMeter();}

  renderIntro();syncNav();
})();
</script>
<script>
(function(){
  var cbtn=document.getElementById("comfortBtn");
  if(!cbtn) return;
  var m=["Default","Calm"], i=0;
  cbtn.addEventListener("click",function(){
    i=(i+1)%m.length;
    document.body.classList.toggle("softer", i===1);
    cbtn.textContent="Comfort: "+m[i];
  });
})();
</script>
