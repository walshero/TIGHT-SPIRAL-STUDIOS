<!--
  CHOOSE YOUR LEADER — v5 · "The Receiver's Game"  ·  three eras, one reflex
  Tight Spiral Productions · walshero@gmail.com · single-file, offline, nothing stored.

  SPINE (v5, founder-locked, carried out in full 2026-07-18):
    "You don't judge the leader. You judge what you were allowed to see."
    Rate blind trust → the record turns → rate again → see how far the words pulled you.

  RELATION TO v6: v6 is the DECIDER'S game (you're in the chair, decide in the fog).
    v5 is the RECEIVER'S game (you're in the room, a broadcast reaches you). Both ship.
    v6 remains at choose-your-leader-v6.html. This is its companion, not its replacement.

  BEAT STRUCTURE (spec §2, full):
    TITLE → BEAT -1 MEDIA PRELUDE → BEAT 0 SCENE → BEAT 1 BLIND REACTION →
    BEAT 2 THE RECORD → BEAT 1' RE-REACT (identical wording) → BEAT 3 VISUAL DESCENT →
    ARC → GLASS ENGINE RINGS → FOOTER (bound to mission).

  ============================ SHIP GATES — READ ==============================
  MEASUREMENT DESIGN IS A HARD SHIP GATE (spec §1.4 / OS §10). This build carries
  the reframed instrument (directional more/less/neutral shown to the player,
  resolved onto a 7-point capture underneath, scored IPSATIVELY against the
  player's own per-scene baseline). The descent math is RE-DERIVED from the new
  inputs (not the v4 4-point recipe). But it has NOT passed a live survey
  methodologist + psychometrician + persuasion-scholar review. Therefore:
    data-ship-gate="MEASUREMENT_PENDING" on <html>.
  DO NOT use for graded assessment / ISLO evidence until that seat signs off.
  The Glass Engine ring surfaces this gate to any reviewer, in plain language.

  IMAGE LANE (spec §1.1 / §3.3 — dual, PD-first, Ideogram-fill):
  Every room + prelude card is a NAMED, SWAPPABLE asset slot carrying a
  data-art-* schema (src / license / author / source / date). The shell renders
  a sourced PLACEHOLDER (period-toned SVG, alt-text = the rhetoric the image
  holds) until a real asset drops. Where PD exists, the manifest names the exact
  Library of Congress / National Archives target; where it does not, the slot is
  flagged for Ideogram (photo-real environment, NEVER a real face, always tagged).
  A real face never ships. A voice likeness never ships. The chair stays anyone's.

  ACCESSIBILITY FLOORS (hard, RP-aware): single-file, offline, in-memory only;
  full-contrast text (token-role law — a token is TEXT or ATMOSPHERE, never both);
  one decision per screen; 44px targets; keyboard nav; visible focus; scroll-reset
  on every screen change; reduced-motion respected; no color-as-sole-signal;
  no emoji; comfort is a live corner control, NEVER an opening wall; scene-first;
  BACK + HOME reachable on every screen (nav floor).

  SOURCING: all record content dated + attributed. Nothing fabricated. The three
  Cold War records are verified (JFK '62, LBJ '64, Nixon '69). Living presidents
  stay GATED — coded, excluded from play, records not fabricated.
-->

<style>

<script>
"use strict";
const SCENES = [
  {
    id:"jfk62", era:"era-62", gated:false,
    when:"October 22, 1962",
    leader:"the President",
    slot:"room.jfk62",
    prelude:[
      { slot:"prelude.jfk62.a", head:"U-2 flights confirm missile sites in Cuba",
        src:"CIA reconnaissance, declassified \u00B7 Oct 1962", pd:true },
      { slot:"prelude.jfk62.b", head:"Grocers report a run on canned goods",
        src:"Contemporary press, Oct 1962", pd:true },
      { slot:"prelude.jfk62.c", head:"Schools drill children under their desks",
        src:"Civil Defense footage, public domain", pd:true },
      { slot:"prelude.jfk62.d", head:"Three networks. One address. Tonight.",
        src:"Broadcast listings, Oct 22 1962", pd:true }
    ],
    room:"A living room lit only by a television set. It is nearly 7 p.m. Nobody has gone to bed.",
    notice:[
      { id:"set",   t:"The television",  s:"Warming up. Three networks carry the same signal. Whatever is said, everyone hears at once — and only once." },
      { id:"paper", t:"The evening paper", s:"Folded on the arm of the chair. It went to press before any of this was known." },
      { id:"phone", t:"The telephone",   s:"It has not rung. No one you know has more than you do right now." },
      { id:"child", t:"The doorway",     s:"A child is meant to be asleep and is not. They are listening too." }
    ],
    quote:"We will not prematurely or unnecessarily risk the costs of worldwide nuclear war in which even the fruits of victory would be ashes in our mouth — but neither will we shrink from that risk at any time it must be faced.",
    reach:"A calm voice, straight to camera, in your living room. It sounds like a man telling you the truth as it happens.",
    record:{
      body:"The address that sounded like a first reaction was day eight of six days of secret deliberation. The calm was rehearsed. A naval \u201Cquarantine\u201D had already been chosen; an air-strike and an invasion had been argued and set aside in a room the country never saw.",
      src:"ExComm records; Kennedy Library. Declassified 1990s."
    }
  },
  {
    id:"lbj64", era:"era-64", gated:false,
    when:"August 4, 1964",
    leader:"the President",
    slot:"room.lbj64",
    prelude:[
      { slot:"prelude.lbj64.a", head:"Reports of a second attack on U.S. destroyers in the Gulf of Tonkin",
        src:"Wire services, Aug 4 1964", pd:true },
      { slot:"prelude.lbj64.b", head:"An election season; the incumbent runs as the steady hand",
        src:"Campaign press, 1964", pd:true },
      { slot:"prelude.lbj64.c", head:"Late-night bulletin interrupts programming",
        src:"Broadcast logs, Aug 4 1964", pd:true }
    ],
    room:"A den, past midnight. The set is still on. A bulletin has cut into the late movie.",
    notice:[
      { id:"set",   t:"The bulletin",   s:"An announcer, grave, reading copy handed to him minutes ago. He knows only what he was given." },
      { id:"map",   t:"The wall map",   s:"The Gulf of Tonkin is a name most people are learning tonight for the first time." },
      { id:"clock", t:"The clock",      s:"Late. Decisions that will outlast the night are being made while most of the country sleeps." },
      { id:"radio", t:"The radio",      s:"Another version of the same story, arriving a half-beat behind the television." }
    ],
    quote:"Repeated acts of violence against the Armed Forces of the United States must be met not only with alert defense, but with positive reply. That reply is being given as I speak to you tonight.",
    reach:"Firm, resolute, in the small hours. It asks nothing of you but to trust that the reply is just.",
    record:{
      body:"The second attack the speech leaned on most likely never happened; a later NSA study found the evidence for it did not hold. The destroyers had been supporting covert raids the public was not told about. The war-powers resolution the address led to had been drafted months before the night it invoked.",
      src:"NSA historical study (Hanyok), declassified 2005; Pentagon Papers."
    }
  },
  {
    id:"nixon69", era:"era-69", gated:false,
    when:"November 3, 1969",
    leader:"the President",
    slot:"room.nixon69",
    prelude:[
      { slot:"prelude.nixon69.a", head:"Hundreds of thousands march against the war",
        src:"Moratorium coverage, Oct\u2013Nov 1969", pd:true },
      { slot:"prelude.nixon69.b", head:"Casualty figures read aloud on the evening news",
        src:"Network news, 1969", pd:true },
      { slot:"prelude.nixon69.c", head:"The President will address the nation on Vietnam",
        src:"Broadcast advisory, Nov 3 1969", pd:true }
    ],
    room:"A living room, early color television. The picture is a little unstable; the colors bleed at the edges.",
    notice:[
      { id:"set",   t:"The color set",  s:"New in the house. The picture warms and drifts. The voice is steady even when the image is not." },
      { id:"chair", t:"The armchair",   s:"Someone who has lost patience with the war sits here, and is being asked for more of it." },
      { id:"paper", t:"The newspaper",  s:"Casualty counts on an inside page, printed too small to feel." },
      { id:"window",t:"The window",     s:"Outside, the street is quiet tonight. Elsewhere it has not been." }
    ],
    quote:"And so tonight — to you, the great silent majority of my fellow Americans — I ask for your support. The more support I can have from the American people, the sooner that pledge can be redeemed.",
    reach:"Intimate, direct, naming you as the reasonable center. It flatters your patience and asks it to hold.",
    record:{
      body:"While the speech asked for patience on a gradual withdrawal, the same administration had been secretly bombing neutral Cambodia since March \u2014 a covert campaign hidden from the public, and from much of the government, for years.",

  { id:"gate-a", gated:true, when:"[PENDING]", quote:"[QUOTE PENDING]", record:{ body:"[RECORD PENDING]", src:"" } },
  { id:"gate-b", gated:true, when:"[PENDING]", quote:"[QUOTE PENDING]", record:{ body:"[RECORD PENDING]", src:"" } },
  { id:"gate-c", gated:true, when:"[PENDING]", quote:"[QUOTE PENDING]", record:{ body:"[RECORD PENDING]", src:"" } }
];
const PLAY = SCENES.filter(s => !s.gated);

const RUNGS = [
  { n:5, lab:"Your own judgment", sub:"You kept your footing. The message didn't override you.", ico:"eye" },
  { n:4, lab:"Standing, a voice",  sub:"Lightly moved, still mostly your own.",                  ico:"figure" },
  { n:3, lab:"A people, a we",     sub:"Pulled toward belonging \u2014 us, one safe message.",   ico:"link" },
  { n:2, lab:"Safety",             sub:"Pulled toward fear and protection.",                     ico:"shield" },
  { n:1, lab:"The floor",          sub:"Where consent stops mattering. How far rhetoric can reach.", ico:"anchor" }
];

const SCALE = [
  { k:1, band:"less", t:"Much less" },
  { k:2, band:"less", t:"Less" },
  { k:3, band:"less", t:"A little less" },
  { k:4, band:"neutral", t:"Neutral" },
  { k:5, band:"more", t:"A little more" },
  { k:6, band:"more", t:"More" },
  { k:7, band:"more", t:"Much more" }
];

const S = { i:0, beat:"title", blind:{}, post:{}, seen:{} };
let AC=null, SND=false;

const $  = s => document.querySelector(s);
const el = (t,c,x)=>{ const n=document.createElement(t); if(c)n.className=c; if(x!=null)n.innerHTML=x; return n; };
const say = h => { $("#say").innerHTML = h; };
const eyebrow = t => { $("#eyebrow").textContent = t; };

const slot = () => { const s=$("#slot"); s.innerHTML=""; return s; };
const scene = () => PLAY[S.i];
const reset = () => window.scrollTo(0,0);

function icon(k){
  const c='stroke="currentColor" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"';
  const P={
    eye:`<circle cx="12" cy="12" r="3.2" ${c}/><path d="M2 12s3.6-6 10-6 10 6 10 6-3.6 6-10 6S2 12 2 12z" ${c}/>`,
    figure:`<circle cx="12" cy="6" r="2.6" ${c}/><path d="M12 9v7M8 20l4-4 4 4M9 12h6" ${c}/>`,
    link:`<circle cx="7" cy="12" r="2.4" ${c}/><circle cx="17" cy="12" r="2.4" ${c}/><path d="M9.4 12h5.2" ${c}/>`,
    shield:`<path d="M12 3l7 3v5c0 4.4-3 7.6-7 9-4-1.4-7-4.6-7-9V6z" ${c}/>`,
    anchor:`<circle cx="12" cy="5" r="2.2" ${c}/><path d="M12 7v13M5 13a7 7 0 0014 0M8 12H5m14 0h-3" ${c}/>`
  };
  return `<svg viewBox="0 0 24 24" role="img" aria-hidden="true">${P[k]||""}</svg>`;
}

/* ============================================================================
   THE ROOM, DRAWN.  Atmosphere only (token-role law: no text lives in the art,
   so the picture carries the PERIOD and never information — every read-line also
   lives in the panel and the alt-text). Not photoreal, by studio law (the "Greg
   the pancake" ruling): a handcrafted, honestly-illustrative diorama, not a fake
   photograph. The broadcast is the one light in the room; the figure on it is
   WITHHELD — scan-line presence in '62/'64, a warm color smear in '69, never a
   resolved face (period bible, the Compositor's law). The empty armchair in the
   foreground is YOU: neutral, in shadow, a rim of screen-light on its edge.
   Structural tones use var() tokens so Comfort + era classes still re-tint the
   world; wood / screen / glow are era literals because the broadcast IS meaning.
   Real photographic rooms still drop into #plate later; this is the sourced
   placeholder the shell was built to render until they do.
   ========================================================================== */
const WOOD = { "era-62":"#4a3826", "era-64":"#3d2e20", "era-69":"#50391f" };

function tv(screenInner, era){
  const wood = WOOD[era] || WOOD["era-62"];
  return `
    <path d="M96 220 l-9 15 M196 220 l9 15" stroke="${wood}" stroke-width="6" stroke-linecap="round"/>
    <rect x="66" y="104" width="160" height="118" rx="6" fill="${wood}"/>
    <rect x="66" y="104" width="160" height="118" rx="6" fill="#000" opacity=".12"/>
    <rect x="80" y="116" width="120" height="82" rx="5" fill="#05080b"/>
    ${screenInner}
    <rect x="80" y="116" width="120" height="82" rx="5" fill="url(#scan)"/>
    <rect x="80" y="116" width="120" height="82" rx="5" fill="none" stroke="#000" stroke-opacity=".55" stroke-width="3"/>
    <circle cx="212" cy="150" r="3.6" fill="#000" opacity=".35"/>
    <circle cx="212" cy="170" r="3.6" fill="#000" opacity=".35"/>`;
}
/* the withheld figure, made of the broadcast — head + shoulders, no features */
const FIG_BW = `
    <path d="M112 198 q28 -34 58 0 z" fill="#aeb9c2" opacity=".85"/>
    <ellipse cx="140" cy="150" rx="16" ry="19" fill="#c4ced6" opacity=".92"/>`;
const FIG_BW_FLAGS = `

function defs(era){

      <stop offset="0" stop-color="#e7a06a" stop-opacity=".85"/>

}

function paintRoom(sc){
  const plate = $("#plate");
  plate.dataset.slot = sc.slot||"";
  plate.dataset.loaded = "0";
  plate.alt = sc.room||"";
  $("#sceneTitle").textContent = sc.room||"";
  $("#art").innerHTML = (ROOM[sc.id] || ROOM.jfk62)();
}

function go(beat){ S.beat=beat; reset(); render(); }

function render(){
  const S_ = slot();
  const back=$("#back"), home=$("#home");
  back.style.visibility = (S.beat==="title") ? "hidden" : "visible";

  if(S.beat==="title") return title(S_);
  const sc = scene();
  if(sc.era){ document.body.classList.remove("era-62","era-64","era-69"); if(sc.era!=="era-62") document.body.classList.add(sc.era); }
  paintRoom(sc);

  if(S.beat==="prelude") return prelude(sc,S_);
  if(S.beat==="room")    return room(sc,S_);
  if(S.beat==="blind")   return rate(sc,S_,"blind");
  if(S.beat==="record")  return record(sc,S_);
  if(S.beat==="post")    return rate(sc,S_,"post");
  if(S.beat==="descent") return descent(sc,S_);
  if(S.beat==="arc")     return arc(S_);
}

function title(S_){
  document.body.classList.remove("era-62","era-64","era-69");
  eyebrow("Choose Your Leader");
  $("#sceneTitle").textContent = "A living room, lit by a television warming up. Three rooms, three broadcasts, one reflex to build.";
  // the 1962 room, set warming up — the world, before the figure arrives.
  const station = `
    <rect x="84" y="120" width="112" height="74" rx="3" fill="#141b22"/>
    <ellipse cx="140" cy="157" rx="30" ry="20" fill="#cfd9e0" opacity=".45"/>
    <line x1="140" y1="120" x2="140" y2="194" stroke="#cfd9e0" stroke-width="1" opacity=".22"/>`;
  $("#art").innerHTML = defs("era-62") + baseRoom({
    era:"era-62", rug:"#3a4a52", rim:"#e6d3a6", screen: station, table: PHONE,
    wall:`
      <rect x="300" y="24" width="74" height="96" fill="#0a0f16"/>
      <line x1="337" y1="24" x2="337" y2="120" stroke="var(--wall-lit)" stroke-width="2"/>
      <line x1="300" y1="72" x2="374" y2="72" stroke="var(--wall-lit)" stroke-width="2"/>
      <circle cx="356" cy="46" r="7" fill="#cdd6de" opacity=".5"/>
      <rect x="298" y="22" width="78" height="100" fill="none" stroke="${WOOD['era-62']}" stroke-width="4"/>`
  });
  say(`<strong>You don't judge the leader. You judge what you were allowed to see.</strong><br><br>
    A real president says a real thing. You decide how much it moves you \u2014 then the record turns,
    and you see what the room wasn't shown. Three moments, about ten minutes.
    <br><br><em>This game uses optional sound (off until you turn it on) and full-contrast text.
    Comfort and sound are in the top-right, always. Back and Home are in the top-left, always.</em>`);
  const b = el("button","btn","Enter the first room"); b.onclick=()=>{ S.i=0; go("prelude"); };
  S_.append(b);
}

function prelude(sc,S_){
  eyebrow(`What was in the air \u00B7 ${sc.when}`);
  say(`Before the broadcast, this is what the country already knew and feared.`);
  const wrap = el("div","cards");
  sc.prelude.forEach(c=>{
    const card = el("div","mcard");
    card.innerHTML = `
      <div class="frame">
        <img data-slot="${c.slot}" data-art-src="" data-art-license="" data-art-source="${c.src}" alt="${c.head}">
        <svg viewBox="0 0 120 90" aria-hidden="true">
          <rect width="120" height="90" fill="var(--era-tint)"/>
          <rect x="10" y="12" width="100" height="52" fill="var(--wall)" opacity="0.6"/>
          <line x1="16" y1="72" x2="104" y2="72" stroke="var(--glow-soft)" stroke-width="2"/>
          <line x1="16" y1="80" x2="80" y2="80" stroke="var(--rule)" stroke-width="2"/>
        </svg>
      </div>
      <div class="cap"><b>${c.head}</b><span class="src">${c.src}${(c.pd && !/public domain/i.test(c.src))?" \u00B7 public domain":""}</span></div>`;
    wrap.append(card);
  });
  S_.append(wrap);
  const b = el("button","btn","Now the room"); b.onclick=()=>go("room");
  S_.append(b);
}

function room(sc,S_){
  eyebrow(`The room \u00B7 ${sc.when}`);
  if(!S.seen[sc.id]) S.seen[sc.id]={};
  say(sc.room + `<br><br><em>Tap whatever your eye goes to.</em>`);
  const chips = el("div","chips");
  sc.notice.forEach(n=>{
    const c = el("button","chip",n.t);
    if(S.seen[sc.id][n.id]) c.dataset.done="1";
    c.onclick=()=>{ S.seen[sc.id][n.id]=1; c.dataset.done="1";
      say(`<strong>${n.t}.</strong> ${n.s}`); click(); reveal(); };
    chips.append(c);
  });
  S_.append(chips);
  const cont = el("button","btn","The set speaks"); cont.disabled=true; cont.id="cont";
  cont.onclick=()=>go("blind"); S_.append(cont);
  function reveal(){ if(Object.keys(S.seen[sc.id]).length>=1) $("#cont").disabled=false; }
}

function rate(sc,S_,phase){
  const first = phase==="blind";
  eyebrow(first ? `The broadcast \u00B7 ${sc.when}` : `Same words \u00B7 now you've seen the record`);
  say(`<div class="quote">\u201C${sc.quote}\u201D</div>
    <em>${sc.reach}</em><br><br>
    <strong>You know this leader. You hear this. Does it move you to trust them more, less, or stay neutral?</strong>`);
  const chips = el("div","chips");
  SCALE.forEach(o=>{
    const c = el("button","chip",o.t); c.setAttribute("aria-pressed","false");
    c.onclick=()=>{
      [...chips.children].forEach(x=>x.setAttribute("aria-pressed","false"));
      c.setAttribute("aria-pressed","true");
      (first?S.blind:S.post)[sc.id]=o.k; click();
      $("#cont").disabled=false;
    };
    chips.append(c);
  });
  S_.append(chips);
  const cont = el("button","btn", first?"Turn the record over":"See where it pulled you");
  cont.id="cont"; cont.disabled=true;
  cont.onclick=()=> first ? go("record") : go("descent");
  S_.append(cont);
}

function record(sc,S_){
  eyebrow(`The record \u00B7 ${sc.when}`);
  say(`What the room could not see:`);
  const card = el("div","card rec");
  card.innerHTML = `<div>${sc.record.body}</div><div class="src">${sc.record.src}</div>`;
  S_.append(card);
  const b = el("button","btn","Hear the same words again"); b.onclick=()=>go("post");
  S_.append(b);
}

function computeLanding(sc){
  const b = S.blind[sc.id] ?? 4, p = S.post[sc.id] ?? b;
  const pull  = Math.max(0, b - 4);
  const brake = Math.max(0, b - p);
  const tier  = Math.min(5, Math.max(1, 5 - pull + Math.min(pull, Math.ceil(brake/2))));
  const noticed = p < b;
  return { tier, noticed, pull, brake };
}
function descent(sc,S_){
  const r = computeLanding(sc);
  eyebrow(`Where the words pulled you \u00B7 ${sc.when}`);
  say(r.noticed
    ? `You trusted them <span class="cool">less</span> once you saw the record. That drop is the brake. Naming the gap is the whole skill.`
    : (r.pull>0
        ? `The words moved you toward trust, and the record didn't pull you back. This is how far rhetoric can carry a person \u2014 not a verdict on you.`
        : `You held. The message didn't override your judgment.`));
  const d = el("div","descent");
  RUNGS.forEach(rung=>{
    const row = el("div","rung"+(rung.n===r.tier?" you":""));
    row.innerHTML = `<div class="ico ${rung.n<=2?'pulled':(rung.n>=4?'cool':'')}">${icon(rung.ico)}</div>
      <div class="lab"><b>${rung.lab}</b><span>${rung.sub}</span></div>`;
    d.append(row);
  });
  S_.append(d);
  const last = S.i>=PLAY.length-1;
  const b = el("button","btn", last?"See the whole arc":"The next room");
  b.onclick=()=>{ if(last){ go("arc"); } else { S.i++; go("prelude"); } };
  S_.append(b);
}

function arc(S_){
  document.body.classList.remove("era-62","era-64","era-69");
  eyebrow("The whole arc");
  $("#sceneTitle").textContent="Three darkened rooms, three sets still glowing — the whole arc at once.";
  const set = (x,tint)=>`
    <ellipse cx="${x+34}" cy="150" rx="60" ry="46" fill="${tint}" opacity=".16"/>
    <rect x="${x}" y="120" width="68" height="60" rx="4" fill="#3f2f1f"/>
    <rect x="${x+7}" y="128" width="54" height="40" rx="3" fill="#0a1015"/>
    <ellipse cx="${x+34}" cy="148" rx="15" ry="12" fill="${tint}" opacity=".55"/>
    <path d="M${x+18} 200 l-5 12 M${x+50} 200 l5 12" stroke="#3f2f1f" stroke-width="4" stroke-linecap="round"/>`;
  $("#art").innerHTML=`<g class="bg"><rect width="400" height="300" fill="var(--wall)"/>
    <rect y="206" width="400" height="94" fill="var(--paper)"/>
    <rect y="200" width="400" height="6" fill="var(--chair)"/>
    ${set(40,"#dbe6ee")}${set(166,"#c7d2da")}${set(292,"#e0a75c")}</g>`;
  say(`Where you held, and where you caught the gap.`);
  PLAY.forEach(sc=>{
    const r=computeLanding(sc);
    const row=el("div","arcrow");
    row.innerHTML=`<b>${sc.when.split(",")[0]}</b>
      <span>${r.noticed?`<span class="cool">caught the gap</span>`:`<span class="pulled">carried</span>`}
      \u2014 landed at rung ${r.tier} of 5</span>`;
    S_.append(row);
  });
  glassEngine(S_);
  const again=el("button","btn","Play again"); again.onclick=()=>{ S.blind={}; S.post={}; S.seen={}; S.i=0; go("title"); };
  S_.append(again);
}

function glassEngine(S_){
  const r1=el("details","ring");
  r1.innerHTML=`<summary>What was this measuring?</summary>
    <p>The distance between two commitments: how far the words moved you before the record,
    and whether that moved back once you saw what the room couldn't. Noticing the gap is the skill \u2014
    not distrust. Calibration, not suspicion.</p>`;
  const r2=el("details","ring");
  r2.innerHTML=`<summary>How the rung was computed</summary>
    <p>Each rating is captured on a 7-point directional scale (three words shown to you, seven steps
    underneath). Your landing is compared only to <em>your own</em> blind rating for that scene \u2014
    never to another player. Pull lowers the rung; noticing the gap brakes the fall.</p>`;
  const r3=el("details","ring");
  r3.innerHTML=`<summary>Is this ready for a classroom grade?</summary>
    <p class="gateflag">Not yet. This instrument and its descent math are provisional.</p>
    <p>Before any graded or ISLO use, the model passes a Measurement Design review \u2014 a survey
    methodologist (scale validity, identical pre/post wording), a psychometrician (is the score a
    coherent construct?), and a persuasion scholar (does it measure how rhetoric actually moves trust?).
    Ship gate: <b>MEASUREMENT_PENDING</b>. Until then it teaches; it does not grade.</p>`;
  const r4=el("details","ring");
  r4.innerHTML=`<summary>Sourcing &amp; what's withheld</summary>
    <p>Every record is dated and attributed; nothing is fabricated. You never see a real face or hear a
    voice likeness \u2014 the chair stays anyone's. Living-president scenes are coded but gated until each
    has a verified, dated, founder-approved record.</p>`;
  [r1,r2,r3,r4].forEach(x=>S_.append(x));
}

const ORDER=["title","prelude","room","blind","record","post","descent","arc"];
$("#back").onclick=()=>{
  if(S.beat==="title") return;
  if(S.beat==="prelude"){
    if(S.i>0){ S.i--; return go("descent"); }
    return go("title");
  }
  const i=ORDER.indexOf(S.beat);
  if(i>0) go(ORDER[i-1]); else go("title");
};
$("#home").onclick=()=>{ if(confirm("Start over? This clears your session.")){ S.blind={};S.post={};S.seen={};S.i=0; go("title"); } };

const STOPS=["","softer","daylight"];
let stop=0;
$("#comfort").onclick=()=>{ stop=(stop+1)%3; document.body.classList.remove("softer","daylight");
  if(STOPS[stop]) document.body.classList.add(STOPS[stop]);
  $("#comfort").setAttribute("aria-pressed", stop?"true":"false");
  live("Comfort: "+(["default","softer","warm daylight"][stop])); };

function acx(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ AC=null; } } return AC; }
function click(){ if(!SND) return; const a=acx(); if(!a) return;
  const o=a.createOscillator(),g=a.createGain(); o.type="sine"; o.frequency.value=520;
  g.gain.setValueAtTime(0.0001,a.currentTime); g.gain.exponentialRampToValueAtTime(0.05,a.currentTime+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+0.12); o.connect(g).connect(a.destination);
  o.start(); o.stop(a.currentTime+0.13); }
$("#snd").onclick=()=>{ SND=!SND; $("#snd").setAttribute("aria-pressed",SND?"true":"false");
  $("#snd").setAttribute("aria-label","Room sound: "+(SND?"on":"off")); $("#snd").textContent=SND?"Sound on":"Sound";
  live("Sound "+(SND?"on":"off")); if(SND) click(); };

$("#foot").innerHTML = `<b>Choose Your Leader.</b> Train the reflex to notice the gap between what a leader
  said and what was true at the time. \u00B7 Tight Spiral Productions \u00B7 single-file, offline, nothing stored.`;

go("title");
</script>
