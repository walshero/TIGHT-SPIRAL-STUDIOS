<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warriors Fantasy Arcade — Tight Spiral Productions</title>
<style>
:root{--paper:#faf5ec;--ink:#211d18;--card:#fffdf7;--edge:#d8cfbe;--gold:#a8791f;--green:#2e6b46;--red:#8a4030;--blue:#1f5fa8;--dim:#5a5348;}
body.warm{--paper:#26221c;--ink:#ecc57a;--card:#2f2a22;--edge:#4a4234;--dim:#c9a967;--green:#8fce9f;--red:#e09a7c;--gold:#e0b45c;--blue:#7fb4e8;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:"Iowan Old Style",Palatino,Georgia,serif;font-size:18px;line-height:1.5;min-height:100vh}
.wrap{max-width:600px;margin:0 auto;padding:14px 14px 50px}
h1{font-size:1.7rem;line-height:1.15}h2{font-size:1.3rem}
button{font-family:inherit;font-size:1rem;color:var(--ink);background:var(--card);border:2px solid var(--ink);border-radius:10px;min-height:48px;padding:10px 14px;cursor:pointer}
button:focus-visible{outline:3px solid var(--blue);outline-offset:2px}
button.primary{background:var(--ink);color:var(--paper);font-weight:700}
body.warm button.primary{background:var(--gold);color:#26221c;border-color:var(--gold)}
.bar{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px}
.podium{background:var(--card);border:2px solid var(--edge);border-radius:14px;padding:14px;margin:10px 0;text-align:center}
.pname{font-size:1.5rem;font-weight:700}
.bid{font-size:2.2rem;font-weight:700;margin:6px 0}
.bidrow{display:flex;gap:10px;justify-content:center}
.board{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.pcard{background:var(--card);border:2px solid var(--edge);border-radius:10px;padding:8px 10px;text-align:left;min-height:56px;font-size:.92rem}
.pcard.gone{opacity:.35;text-decoration:line-through}
.screen{display:none}.screen.on{display:block}
.foot{font-size:.8rem;color:var(--dim);margin-top:26px}
</style>
</head>
<body>
<div class="wrap">
<section class="screen on" id="draft"><h1>Warriors Fantasy Arcade</h1><p>Placeholder shim — full engine restored via fetch lane next session.</p></section>
</div>
</body>
</html>
