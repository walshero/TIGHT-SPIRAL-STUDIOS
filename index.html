<!DOCTYPE html>
<html lang="en">
<!-- TIGHT SPIRAL STUDIOS — cabinet LOCKED 2026-07-06 (last day of class).
     Index shows EN195 only. Full arcade returns next season.
     Explicit dark palette (never inherit OS charcoal). CC0 art, original SVG. -->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle cx='20' cy='20' r='19' fill='%230f5566'/%3E%3Cpath d='M20 7C11 7 7 14 7 20c0 6 4 11 11 11 5 0 9-3 9-8 0-4-3-6-6-6-3 0-4 2-4 4 0 1 1 2 2 2' fill='none' stroke='%23f0c357' stroke-width='3' stroke-linecap='round'/%3E%3C/svg%3E">
<title>Tight Spiral Studios — EN195</title>
<style>
:root{ --ink:#241a10; --bg:#f0e4cc; --card:#faf3e3; --line:#b39c72;
  --slate:#33485a; --gold:#d09a12; --gold-dk:#8a5c00; --rust:#96381a; --plum:#4e2a4c; }
@media (prefers-color-scheme: dark){
  :root{ --ink:#f3e6c6; --bg:#1a1712; --card:#262019; --line:#5d543d;
    --slate:#9ab6c8; --gold:#f0c357; --gold-dk:#f0c357; --rust:#eaa183; --plum:#d39bc8; }
}
*{box-sizing:border-box}
body{ margin:0; font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  background:var(--bg); color:var(--ink); font-size:19px; line-height:1.5;
  display:flex; min-height:100vh; align-items:center; justify-content:center; padding:1rem; }
.card{ max-width:560px; width:100%; background:var(--card); border:3px solid var(--line);
  border-radius:18px; padding:1.2rem 1.1rem 1.4rem; text-align:center; }
h1{ font-family:Georgia,serif; font-size:1.35rem; color:var(--plum); margin:.6rem 0 .1rem; }
p{ margin:.3rem 0 .9rem; font-size:.95rem; }
svg{ width:100%; max-width:340px; height:auto; display:block; margin:0 auto; }
a.big{ display:block; background:var(--gold); color:#241a10; border:3px solid #241a10;
  border-radius:14px; padding:1rem; font-weight:800; font-size:1.15rem;
  text-decoration:none; min-height:56px; }
a.big:focus-visible{ outline:4px solid var(--rust); outline-offset:3px; }
.foot{ font-size:.78rem; margin-top:1rem; color:var(--ink); }
</style>
</head>
<body>
<div class="card">
  <svg viewBox="0 0 300 240" role="img" aria-label="An arcade cabinet, closed, with a big padlock. A note taped on says EN195 room open.">
    <title>Locked cabinet — CC0, original, Tight Spiral Paper Craft</title>
    <rect x="70" y="18" width="160" height="200" rx="12" fill="var(--slate)" stroke="var(--ink)" stroke-width="3"/>
    <rect x="86" y="34" width="128" height="74" rx="6" fill="var(--bg)" stroke="var(--ink)" stroke-width="3"/>
    <path d="M100 92 q26 -38 52 0 q24 -30 48 0" fill="none" stroke="var(--gold)" stroke-width="4" stroke-linecap="round"/>
    <rect x="86" y="120" width="128" height="10" rx="5" fill="var(--ink)" opacity=".55"/>
    <rect x="86" y="140" width="128" height="10" rx="5" fill="var(--ink)" opacity=".55"/>
    <rect x="122" y="126" width="56" height="46" rx="8" fill="var(--gold)" stroke="var(--ink)" stroke-width="3"/>
    <path d="M134 126 v-12 a16 16 0 0 1 32 0 v12" fill="none" stroke="var(--ink)" stroke-width="6"/>
    <circle cx="150" cy="146" r="6" fill="var(--ink)"/>
    <rect x="146" y="150" width="8" height="12" rx="3" fill="var(--ink)"/>
    <g transform="rotate(-7 232 190)">
      <rect x="196" y="172" width="72" height="40" rx="4" fill="var(--card)" stroke="var(--rust)" stroke-width="3"/>
      <text x="232" y="190" text-anchor="middle" font-size="13" font-weight="800" fill="var(--rust)">EN195</text>
      <text x="232" y="204" text-anchor="middle" font-size="10" font-weight="700" fill="var(--ink)">room open</text>
    </g>
  </svg>
  <h1>The cabinet is locked for the season.</h1>
  <p>Last day of class. One door stays open:</p>
  <a class="big" href="en195.html">Enter EN195 — Last Week</a>
  <p class="foot">Tight Spiral Studios · the arcade returns next semester</p>
</div>
</body>
</html>
