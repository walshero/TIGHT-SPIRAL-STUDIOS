<!DOCTYPE html>
<html lang="en">
<!--
  SANDBAGS — a flash-fiction compression game. Tight Spiral Studios · walshero@gmail.com
  EN195 Creative Writing. The last week. The compression move, made physical.

  COMFORT: NO WALL (2026-07-06). The screen-zero palette gate is GONE. Content renders
  first; the top-bar "Comfort" button cycles softer/default/warm-dark live. A comfort

<title>Sandbags — a flash fiction climb</title>
<style>
:root{
  color-scheme:light;
  --bg:#f3ead8; --surface:#fffaf0; --ink:#1f1b12; --ink2:#1f1b12;
  --line:#d8caa8; --line2:#c2b288;
  --accent:#3a4654; --accent2:#2b3540;
  --gold:#6e4700; --gold-br:#c8900a; --gold-pale:#fbeec6;
  --rust:#8a3a1c; --sky:#cdd8e2;
  --focus:#c8900a;
  --serif:Georgia,'Times New Roman',serif;
  --sans:system-ui,-apple-system,'Segoe UI',sans-serif;
  --display:'Times New Roman',Georgia,serif;
}
body.softer{ --bg:#d9d2c4; --surface:#e2dccf; --ink:#241f16; --ink2:#241f16; --line:#c9bfa6; --line2:#b3a685; --sky:#cdd6df; }
body.warm{ color-scheme:dark; --bg:#1c1a16; --surface:#26231d; --ink:#f3e4c0; --ink2:#f3e4c0; --line:#4a4230; --line2:#5e553e;

  --rust:#e8a07c; --sky:#2c3540; }
*{box-sizing:border-box;} html,body{margin:0;}
body{ font-family:var(--serif); background:var(--bg); color:var(--ink); line-height:1.55; font-size:19px; -webkit-text-size-adjust:100%; }
