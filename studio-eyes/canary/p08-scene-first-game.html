<!doctype html><meta charset="utf-8"><title>Scene first</title>
<meta name="tsp:surface" content="game">
<style>
:root{--paper:#12161c;--ink:#eef1f4;--accent:#c7b28a;--accent-ink:#171208}
html,body{margin:0;height:100%}
body{background:var(--paper);color:var(--ink);font:16px/1.6 Georgia,serif;display:flex;flex-direction:column}
.scene{flex:1;min-height:70vh}
.btn{min-height:44px;min-width:44px;background:var(--accent);color:var(--accent-ink);border:0;padding:.7em 1.3em;margin:1rem}
:focus-visible{outline:3px solid #9fd0ff;outline-offset:3px}
</style>
<svg class="scene" viewBox="0 0 300 200" role="img" aria-label="A dark 1962 living room. A television is the only light.">
  <rect width="300" height="200" fill="#1b2530"/>
  <rect x="110" y="70" width="80" height="58" fill="#c9d4dc"/>
  <rect x="40" y="140" width="70" height="50" fill="#0d1116"/>
</svg>
<button class="btn">Turn on the set</button>
