<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="A smoke-read calibration trainer. Read what the fire is about to do from what the smoke is doing — commit under uncertainty, then meet the record. Look away from the light. Not certification — calibration. Offline, private, single file. Includes a facilitator mode for running a crew debrief.">
<title>Reading the Smoke — a smoke-read calibration case</title>
<meta name="tsp:surface" content="game">
<style>
  :root{
    --paper:#f7f4ee; --ink:#0f0d0a; --ink2:#2a2620;
    --card:#fffdf9; --rule:#cdc5b6; --shade:#ece6da;
    --band:#12100b; --band-ink:#f7f4ee;
    --dusk:#7a3d00; --field:#124a44; --pick:#0a3a86;
    --focus:#0a4fd0; --alarm:#8c2f39; --leaf:#2f5a1f;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--paper);color:var(--ink2);font:400 19px/1.62 "Iowan Old Style","Palatino Linotype",Georgia,serif;-webkit-text-size-adjust:100%}
  .skip{position:absolute;left:-9999px}
  .skip:focus{left:12px;top:12px;position:fixed;z-index:20;background:var(--ink);color:var(--paper);padding:10px 14px;border-radius:8px}
  .comfort{position:fixed;top:10px;right:10px;z-index:15}
  .comfort button{font:700 14px/1 ui-monospace,Menlo,Consolas,monospace;padding:9px 12px;border:2px solid var(--ink);border-radius:9px;background:var(--card);color:var(--ink);cursor:pointer;min-height:40px}
  .comfort button:focus-visible{outline:3px solid var(--focus);outline-offset:2px}
  .nav{position:fixed;top:10px;left:10px;z-index:15;display:flex;gap:8px}
  .nav button{font:700 14px/1 ui-monospace,Menlo,Consolas,monospace;padding:9px 12px;border:2px solid var(--ink);border-radius:9px;background:var(--card);color:var(--ink);cursor:pointer;min-height:40px;min-width:44px}
  .nav button:hover{background:var(--ink);color:var(--paper)}
  .nav button:focus-visible{outline:3px solid var(--focus);outline-offset:2px}
  .nav button[disabled]{opacity:.4;cursor:default}
  .nav button[disabled]:hover{background:var(--card);color:var(--ink)}
  /* WARM MODE: text tokens are COOL near-white (raise blue toward R=G=B). Amber lives only in
     the art fills, never in a color: token. This is the RP floor the collapse case tripped;
     fixed here from the start so preship-gate-v4 exits SHIP. */
  body.warm{--paper:#151210;--ink:#eef0f3;--ink2:#d6dae0;--card:#211b15;--rule:#483d2d;--shade:#2a2217;--band:#0c0a07;--band-ink:#eef0f3;--dusk:#c9d2db;--field:#7fd3c8;--pick:#9db8ee;--alarm:#f0a3ab;--leaf:#a9c98f}
  body.warm .choice[aria-pressed="true"]{background:#31281b;border-color:#9db8ee}
  body.warm .art{filter:brightness(.86) saturate(.92)}
  .wrap{max-width:820px;margin:0 auto;padding:0 20px 120px}
  .stage{min-height:100vh;display:none;flex-direction:column;justify-content:center;padding:74px 0 40px}
  .stage.on{display:flex}
  .kicker{font:700 13px/1.2 ui-monospace,Menlo,Consolas,monospace;letter-spacing:.16em;text-transform:uppercase;color:var(--dusk);margin:0 0 14px}
  h1{font-weight:700;font-size:clamp(30px,7vw,50px);line-height:1.06;margin:0 0 10px;color:var(--ink);letter-spacing:-.01em}
  h2{font-weight:700;font-size:clamp(23px,5vw,33px);line-height:1.12;margin:0 0 16px;color:var(--ink)}
  .sub{font-size:20px;color:var(--ink2);margin:0 0 28px;max-width:62ch}
  .art{display:block;width:100%;max-width:600px;margin:0 auto 24px;border:2px solid var(--rule);border-radius:12px;overflow:hidden;background:var(--card);aspect-ratio:8/5}
  .art svg{display:block;width:100%;height:100%}
  .prompt{font-weight:700;color:var(--ink);font-size:21px;margin:0 0 8px;max-width:60ch}
  .known{background:var(--card);border:2px solid var(--rule);border-left:6px solid var(--field);border-radius:10px;padding:15px 18px;margin:0 0 18px}
  .known h3{margin:0 0 8px;font:700 12px/1.3 ui-monospace,Menlo,Consolas,monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--field)}
  .known ul{margin:0;padding:0 0 0 20px}
  .known li{font-size:17px;color:var(--ink);margin:0 0 6px;line-height:1.45}
  .known .tag{font:700 10px/1 ui-monospace,Menlo,Consolas,monospace;letter-spacing:.06em;color:var(--dusk);border:1px solid var(--dusk);border-radius:4px;padding:2px 5px;margin-left:6px;white-space:nowrap;text-transform:uppercase}
  .known .tag.pend{color:var(--alarm);border-color:var(--alarm)}
  .choices{display:flex;flex-direction:column;gap:12px;margin:0 0 8px}
  .choice{display:block;width:100%;text-align:left;cursor:pointer;background:var(--card);border:2px solid var(--rule);border-radius:11px;padding:15px 18px;font:inherit;font-size:18px;color:var(--ink);line-height:1.42;min-height:44px}
  .choice:hover{border-color:var(--ink)}
  .choice:focus-visible{outline:3px solid var(--focus);outline-offset:2px}
  .choice[aria-pressed="true"]{border-color:var(--pick);border-width:3px;background:var(--shade)}
  .conf{margin:16px 0 6px;padding:15px 18px;background:var(--shade);border:2px solid var(--rule);border-radius:10px}
  .conf h3{margin:0 0 4px;font-size:17px;color:var(--ink)}
  .conf p{margin:0 0 12px;font-size:15px;color:var(--ink2)}
  .conf .row{display:flex;gap:10px;flex-wrap:wrap}
  .conf button{flex:1;min-width:120px;min-height:48px;cursor:pointer;font:700 15px/1.2 inherit;font-family:inherit;padding:12px 10px;border-radius:9px;border:2px solid var(--rule);background:var(--card);color:var(--ink)}
  .conf button:hover{border-color:var(--ink)}
  .conf button:focus-visible{outline:3px solid var(--focus);outline-offset:2px}
  .conf button[aria-pressed="true"]{border-color:var(--pick);border-width:3px;background:var(--paper)}
  .reveal{margin:20px 0 0;padding:18px 20px;border-radius:10px;background:var(--shade);border-left:6px solid var(--pick);color:var(--ink);font-size:18px}
  .reveal.hidden{display:none}
  .reveal h3{margin:0 0 8px;font-size:19px;color:var(--ink)}
  .reveal b{color:var(--ink)}
  .reveal .hidden-var{border-left:4px solid var(--dusk);padding:6px 0 6px 14px;margin:12px 0}
  .reveal .score{margin:14px 0 0;padding:12px 14px;border-radius:8px;background:var(--card);border:2px solid var(--rule);font-size:17px}
  .reveal .score b{color:var(--field)}
  .reveal .score.miss b{color:var(--alarm)}
  .review{margin:18px 0 0;padding:16px 18px;background:var(--card);border:2px dashed var(--rule);border-radius:11px}
  .review h3{margin:0 0 4px;font-size:16px;color:var(--ink)}
  .review p{margin:0 0 12px;font-size:14px;color:var(--ink2)}
  .review .verds{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 12px}
  .review .verds button{cursor:pointer;font:700 13px/1.2 ui-monospace,Menlo,Consolas,monospace;padding:9px 12px;border-radius:8px;border:2px solid var(--rule);background:var(--paper);color:var(--ink);min-height:42px}
  .review .verds button:hover{border-color:var(--ink)}
  .review .verds button:focus-visible{outline:3px solid var(--focus);outline-offset:2px}
  .review .verds button[aria-pressed="true"]{border-width:3px;background:var(--shade)}
  .review .verds button.v-good[aria-pressed="true"]{border-color:var(--field)}
  .review .verds button.v-bad[aria-pressed="true"]{border-color:var(--alarm)}
  .review textarea{width:100%;min-height:72px;font:inherit;font-size:16px;padding:12px 14px;border:2px solid var(--rule);border-radius:9px;background:var(--paper);color:var(--ink);resize:vertical}
  .review textarea:focus-visible{outline:3px solid var(--focus);outline-offset:2px}
  .review .seat-hint{font-size:13px;color:var(--ink2);margin:8px 0 0;font-style:italic}
  .disclaimer{background:var(--shade);border:2px dashed var(--rule);border-radius:10px;padding:14px 16px;margin:0 0 22px;font-size:16px;color:var(--ink);font-weight:700}
  .disclaimer .word{color:var(--alarm)}
  .btn{display:inline-block;text-decoration:none;cursor:pointer;font:700 17px/1 inherit;font-family:inherit;padding:14px 20px;border-radius:10px;border:2px solid var(--ink);background:var(--ink);color:var(--paper);margin:6px 8px 6px 0;min-height:44px}
  .btn.ghost{background:var(--card);color:var(--ink)}
  .btn:hover{opacity:.9}
  .btn:focus-visible{outline:3px solid var(--focus);outline-offset:2px}
  .btn[disabled]{opacity:.45;cursor:default}
  .btnrow{margin:20px 0 0}
  .prog{font:700 13px/1 ui-monospace,Menlo,Consolas,monospace;letter-spacing:.1em;color:var(--dusk);margin:0 0 12px}
  .credit{margin:14px 0 0;font-size:15px;color:var(--ink2);font-style:italic}
  .export{background:var(--card);border:2px dashed var(--rule);border-radius:12px;padding:20px 22px;margin:22px 0 0}
  .export h3{margin:0 0 8px;font-size:18px;color:var(--ink)}
  .export p{margin:0 0 14px;font-size:16px;color:var(--ink2)}
  .export textarea{width:100%;min-height:180px;font:inherit;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px;line-height:1.5;padding:14px;border:2px solid var(--rule);border-radius:9px;background:var(--paper);color:var(--ink);resize:vertical}
  .export .note{font-size:14px;color:var(--ink2);margin:12px 0 0}
  /* facilitator hub (officer face) */
  .hubintro{background:var(--shade);border:2px dashed var(--rule);border-radius:10px;padding:14px 16px;margin:0 0 22px;font-size:16px;color:var(--ink)}
  .seg{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 8px}
  .seg button{cursor:pointer;font:700 14px/1.2 ui-monospace,Menlo,Consolas,monospace;padding:11px 14px;border-radius:9px;border:2px solid var(--rule);background:var(--card);color:var(--ink);min-height:44px}
  .seg button:hover{border-color:var(--ink)}
  .seg button:focus-visible{outline:3px solid var(--focus);outline-offset:2px}
  .seg button[aria-pressed="true"]{border-color:var(--pick);border-width:3px;background:var(--shade)}
  .field{display:flex;flex-direction:column;gap:6px;margin:0 0 14px}
  .field label{font:700 13px/1.2 ui-monospace,Menlo,Consolas,monospace;letter-spacing:.06em;text-transform:uppercase;color:var(--field)}
  .field input,.field select{font:inherit;font-size:17px;padding:11px 13px;border:2px solid var(--rule);border-radius:9px;background:var(--paper);color:var(--ink);min-height:44px}
  .field input:focus-visible,.field select:focus-visible{outline:3px solid var(--focus);outline-offset:2px}
  .matrix{width:100%;border-collapse:collapse;margin:6px 0 4px;font-size:15px}
  .matrix caption{caption-side:top;text-align:left;font:700 12px/1.3 ui-monospace,Menlo,Consolas,monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--field);margin:0 0 8px}
  .matrix th,.matrix td{border:2px solid var(--rule);padding:10px 12px;text-align:center;color:var(--ink);vertical-align:top}
  .matrix th{background:var(--shade);font:700 13px/1.2 ui-monospace,Menlo,Consolas,monospace}
  .matrix td .n{font:700 22px/1 inherit;display:block;color:var(--ink)}
  .matrix td .who{font-size:13px;color:var(--ink2);margin-top:4px;line-height:1.35}
  .matrix td.sound{background:color-mix(in srgb,var(--field) 12%,var(--card))}
  .matrix td.killcell{background:color-mix(in srgb,var(--alarm) 16%,var(--card));border-color:var(--alarm);border-width:3px}
  .killnote{font-size:14px;color:var(--ink);margin:4px 0 18px}
  .killnote b{color:var(--alarm)}
  .readlist{list-style:none;margin:0 0 10px;padding:0}
  .readlist li{font-size:15px;color:var(--ink);padding:8px 0;border-bottom:1px solid var(--rule);display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .readlist .off{color:var(--alarm);font-weight:700}
  .readlist .snd{color:var(--field);font-weight:700}
  footer{margin-top:34px;padding-top:18px;border-top:2px solid var(--rule);font-size:15px;color:var(--ink2)}
  footer b{color:var(--ink)}
  @media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}}
  @media (max-width:560px){.conf button{flex-basis:100%}.matrix th,.matrix td{padding:8px 6px;font-size:13px}}
</style>
</head>

</div>

<main id="main" class="wrap">

</main>
<script>
const SEATS={feel:{seat:"THE HAND",hint:"routes to the Hand — the texture of the call"},fact:{seat:"THE ENGINEER",hint:"routes to the Engineer — a fire-behavior or number problem"},frame:{seat:"THE COORDINATOR",hint:"routes to the Coordinator — the operational frame / sequence"},source:{seat:"THE REGISTRAR",hint:"routes to the Registrar — a provenance / citation gap"},score:{seat:"THE CALIBRATOR",hint:"routes to the Calibrator — the scoring / calibration logic"},access:{seat:"THE STRANGER",hint:"routes to the Stranger — a readability / access problem"},works:{seat:"—",hint:"logged as working, no seat owes a fix"}};

const VIG='<radialGradient id="vg" cx="44%" cy="52%" r="62%"><stop offset="50%" stop-color="#000" stop-opacity="0"/><stop offset="100%" stop-color="#000" stop-opacity="0.72"/></radialGradient>';

const SMOKE={
  slug:"nist-compartment-2026",
  title:"Reading the Smoke",
  subtitle:"A two-story house, 2:40 a.m. Smoke is showing before you are off the rig. What the smoke is doing tells you what the fire is about to do — if you read the smoke instead of the flame.",
  kicker:"A smoke-read calibration case",
  reviewer:"Ben Urwin — Montreal firefighter & lieutenant",
  sourceNote:"Smoke-behavior framing drawn from published fire-dynamics doctrine (NIST full-scale compartment-fire research; FSRI flow-path and ventilation coursework used as design reference only, never reused imagery). Every fire-behavior figure below is OBSERVED or PENDING. Nothing is invented.",
  imageNote:"NIST-SOURCE-PENDING: the scene art here is authored placeholder in the NIST public-domain idiom. Replace with actual NIST public-domain compartment-burn stills (ignition-to-flashover series; Madrzykowski/NIST credit line). Ben's cleared department photos are the streetside-realism upgrade path.",
  openArt:{label:"A two-story house at night, dark against the sky, thick pale smoke pushing out along the whole eave line, and a single first-floor window glowing amber — seen through the soft dark ring of RP vision.",
    svg:`<svg viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg"><rect width="800" height="500" fill="#12100b"/><rect x="0" y="410" width="800" height="90" fill="#1c160f"/><path d="M250 410 L250 190 L400 120 L550 190 L550 410 Z" fill="#241d13"/><path d="M235 196 L400 112 L565 196 L550 208 L400 132 L250 208 Z" fill="#2e2617"/><rect x="300" y="250" width="52" height="60" fill="#2a2216"/><rect x="448" y="250" width="52" height="60" fill="#d98a2e"/><rect x="448" y="250" width="52" height="60" fill="#f0c060" opacity="0.4"/><rect x="360" y="320" width="80" height="90" fill="#241c12"/><g fill="#b7b1a6"><ellipse cx="330" cy="185" rx="120" ry="42" opacity="0.34"/><ellipse cx="470" cy="170" rx="150" ry="50" opacity="0.4"/><ellipse cx="400" cy="140" rx="180" ry="55" opacity="0.3"/><ellipse cx="540" cy="120" rx="130" ry="46" opacity="0.24"/><ellipse cx="270" cy="150" rx="95" ry="38" opacity="0.22"/></g><g fill="#8a8479"><ellipse cx="450" cy="195" rx="90" ry="26" opacity="0.5"/><ellipse cx="330" cy="205" rx="80" ry="22" opacity="0.42"/></g><rect x="0" y="0" width="800" height="500" fill="url(#vg)"/>${VIG}</svg>`},
  turns:[
    {id:"t1",prog:"Read 1 of 3",
      art:{label:"Close on the eave line of a dark house: thick, fast, dark smoke pushing out under pressure the length of the roof, and one bright amber window low and to the right pulling the eye.",
        svg:`<svg viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg"><rect width="800" height="500" fill="#141009"/><rect x="0" y="300" width="800" height="200" fill="#20180f"/><rect x="60" y="150" width="680" height="150" fill="#241d13"/><rect x="70" y="150" width="660" height="20" fill="#181209"/><g fill="#9a948a"><ellipse cx="180" cy="120" rx="150" ry="48" opacity="0.42"/><ellipse cx="400" cy="95" rx="200" ry="56" opacity="0.5"/><ellipse cx="620" cy="120" rx="160" ry="50" opacity="0.44"/><ellipse cx="300" cy="70" rx="150" ry="44" opacity="0.34"/><ellipse cx="560" cy="60" rx="150" ry="42" opacity="0.3"/></g><g fill="#6f695f"><ellipse cx="360" cy="140" rx="150" ry="26" opacity="0.55"/><ellipse cx="600" cy="150" rx="120" ry="22" opacity="0.5"/></g><rect x="600" y="200" width="70" height="80" fill="#d98a2e"/><rect x="600" y="200" width="70" height="80" fill="#f4c866" opacity="0.45"/><path d="M600 200 L670 200 L690 180 L620 175 Z" fill="#e59a34" opacity="0.5"/><rect x="0" y="0" width="800" height="500" fill="url(#vg)"/>${VIG}</svg>`},
      prompt:"Fire is visible at the first-floor window on the right — your eye keeps going to it. But the whole eave line is pushing thick, fast, dark smoke under pressure. What is your first read?",
      known:{title:"What the smoke is doing (VVDC)",items:[
        {t:"Volume: heavy — the entire eave line is pushing smoke, not one vent.",tag:"OBSERVED"},
        {t:"Velocity: fast and turbulent, pushing under pressure — angry smoke.",tag:"OBSERVED"},
        {t:"Density: thick and optically black; you cannot see into it.",tag:"OBSERVED"},
        {t:"Color: dark brown-to-black — hot products of incomplete combustion.",tag:"OBSERVED"},
        {t:"Visible flame at one first-floor window.",tag:"OBSERVED"},
        {t:"Time-to-flashover for these smoke conditions:",tag:"PENDING-ENGINEER"}]},
      choices:[
        {id:"a",t:"Put the eye and the attack on the room with visible fire — that is where the fire is.",trap:true},
        {id:"b",t:"Read the smoke, not the flame: heavy, fast, dense, dark smoke pushing the whole eave line is a ventilation-limited fire heading for flashover. Call it and set up to control the flow path before anyone enters.",best:true},
        {id:"c",t:"Fast interior push to the visible fire before it spreads.",trap:true},
        {id:"d",t:"I cannot call the flashover timing from the street — 360 size-up and a fire-behavior read before I commit the crew.",limit:true}],
      reveal:{heading:"What the smoke was telling you",
        hidden:"The flame at the window is the light, and it pulls every eye on the crew. But the flame is not the predictor — the smoke is. Heavy, fast, dense, dark smoke pushing the whole eave line under pressure is a fire that has run out of air and is loading toward flashover. Read the smoke's velocity and density and you see the fire the single flame is hiding.",
        bestSays:"Reading the smoke over the flame (B), or naming your limit and getting the 360 plus a fire-behavior read (D), is the sound call. The pull to the one visible flame is exactly the reflex that walks a crew into the flow path of a compartment about to flash.",
        trapSays:"Going to the visible fire feels obvious — it is the thing you can see. That is the trap. The flame at one window tells you where fire vented; the smoke pushing the whole eave line tells you the whole structure is loading toward flashover. The light is the distraction; the smoke is the warning.",
        note:"PENDING-ENGINEER: the actual time-to-flashover for these conditions is a fire-dynamics figure a fire-behavior authority (NIST/FSRI research) must author. The case names the read; it does not invent the clock."},
      calib:{soundIds:["b","d"],
        highConfWrong:"You were very sure of a read that sends the crew toward the light and into the flow path. In this domain high confidence in the wrong direction is the specific thing that flashes over on a crew. The score is not punishing the miss — it is flagging that your certainty outran what the smoke actually showed.",
        lowConfRight:"You read the smoke over the flame but were not sure of it. That is honest — the street did not hand you certainty, and you did not pretend it did.",
        highConfRight:"Sound read, and sure of it — earned, because heavy fast dark smoke pushing a whole eave line is one of the clearest flashover warnings a size-up can give.",
        lowConfWrong:"Wrong read, held loosely. The doubt is the right instinct — follow it next time toward the smoke, away from the light."}},
    {id:"t2",prog:"Read 2 of 3",
      art:{label:"A doorway at night with dark smoke pushing out of the top and drawing back in, the neutral plane low near the floor, a faint orange glow deep inside.",
        svg:`<svg viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg"><rect width="800" height="500" fill="#130f08"/><rect x="270" y="70" width="260" height="410" fill="#0c0a06"/><rect x="270" y="70" width="260" height="410" fill="none" stroke="#2c2416" stroke-width="10"/><g fill="#8f897e"><ellipse cx="400" cy="130" rx="150" ry="42" opacity="0.5"/><ellipse cx="340" cy="110" rx="110" ry="34" opacity="0.4"/><ellipse cx="470" cy="115" rx="120" ry="36" opacity="0.38"/></g><g fill="#5f594f"><ellipse cx="400" cy="175" rx="130" ry="26" opacity="0.6"/></g><rect x="290" y="350" width="220" height="120" fill="#1a1109"/><path d="M330 470 L400 300 L470 470 Z" fill="#c46a1f" opacity="0.4"/><path d="M360 470 L400 350 L440 470 Z" fill="#e59a34" opacity="0.45"/><rect x="0" y="0" width="800" height="500" fill="url(#vg)"/>${VIG}</svg>`},
      prompt:"You are at the door. Smoke pushing out the top pulses — out, then draws back in — and the neutral plane is dropping fast toward the floor. Command asks: is it tenable to enter? What is your read?",
      known:{title:"What the smoke is doing (VVDC)",items:[
        {t:"The smoke at the opening is pulsing — pushing out, then drawing back in.",tag:"OBSERVED"},
        {t:"The neutral plane is dropping fast toward the floor.",tag:"OBSERVED"},
        {t:"Velocity is increasing and the smoke is darkening.",tag:"OBSERVED"},
        {t:"Air is being pulled inward at the base of the door — a strong air track.",tag:"OBSERVED"},
        {t:"Exact flashover window for this compartment:",tag:"PENDING-ENGINEER"}]},
      choices:[
        {id:"a",t:"Enter now and get water on it before it flashes — speed beats the fire.",trap:true},
        {id:"b",t:"Do not enter the flow path. Pulsing smoke plus a dropping neutral plane is a ventilation-limited fire at or near flashover; cool from outside and coordinate ventilation before anyone enters.",best:true},
        {id:"c",t:"Send one firefighter in low and fast to search while it is still readable.",trap:true},
        {id:"d",t:"This is a flashover-imminent read above a safe entry call — hold the door, get fire-behavior eyes and a coordinated vent before committing the crew.",limit:true}],
      reveal:{heading:"What the smoke was telling you",
        hidden:"Smoke that breathes — pushing out then drawing back — is a fire pulling for air it does not have. With the neutral plane dropping and velocity rising, the compartment is at or near flashover. Making entry opens the flow path, and that inrush of air can be the exact input that flashes it — with the crew standing inside the path.",
        bestSays:"Holding out of the flow path and cooling / coordinating ventilation first (B), or naming the flashover-imminent read and holding for fire-behavior eyes (D), is the sound call. The urge to beat the fire by entering is the urge that puts a crew in the path when it lights.",
        trapSays:"Entering to 'get water on it first' feels aggressive and correct. It is the trap. You cannot out-run a flashover you are standing inside of; opening that door can be what triggers it. Water goes in first from outside the path, not by putting bodies in it.",
        note:"PENDING-ENGINEER: the exact flashover window for this compartment is a fire-dynamics figure the research authority must author. The case renders the read, not the number."},
      calib:{soundIds:["b","d"],
        highConfWrong:"You were sure it was tenable to enter a compartment that is breathing and dropping its neutral plane. That certainty is the dangerous kind — those signs mean the room can flash on the air you let in, and confidence does not change the physics.",
        lowConfRight:"You held the crew but were not certain — right, because the exact flashover moment genuinely was not knowable from the door. Your doubt matched the evidence.",
        highConfRight:"Sound and sure. Pulsing smoke with a dropping neutral plane is one of the few pre-flashover reads you are allowed to be certain about.",
        lowConfWrong:"Wrong call, loosely held — let the doubt pull you out of the flow path next time."}},
    {id:"t3",prog:"Read 3 of 3",
      art:{label:"A room interior after ventilation: the visible fire knocked down, the lower air clearer, but a fast dark band of smoke still banked hard along the ceiling.",
        svg:`<svg viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg"><rect width="800" height="500" fill="#171207"/><rect x="0" y="0" width="800" height="180" fill="#0b0906"/><g fill="#514b41"><ellipse cx="400" cy="120" rx="360" ry="70" opacity="0.7"/><ellipse cx="250" cy="150" rx="200" ry="46" opacity="0.5"/><ellipse cx="600" cy="145" rx="220" ry="48" opacity="0.5"/></g><g fill="#7d776c"><ellipse cx="430" cy="90" rx="180" ry="34" opacity="0.4"/></g><rect x="0" y="360" width="800" height="140" fill="#241a10"/><rect x="120" y="300" width="140" height="70" fill="#2a2013"/><rect x="540" y="290" width="150" height="80" fill="#2a2013"/><path d="M330 360 L370 315 L410 360 Z" fill="#b85f1c" opacity="0.35"/><rect x="0" y="0" width="800" height="500" fill="url(#vg)"/>${VIG}</svg>`},
      prompt:"Ventilation is done, the visible fire knocked down, and the smoke lifts enough to see the room. It looks better and the crew wants to advance. But the smoke at the ceiling is still fast and dark. What now?",
      known:{title:"What the smoke is doing (VVDC)",items:[
        {t:"Visible flame knocked down after ventilation.",tag:"OBSERVED"},
        {t:"Smoke at the ceiling is still fast, dark, and banked hard.",tag:"OBSERVED"},
        {t:"Interior temperature still high; the upper layer has not been cooled.",tag:"OBSERVED"},
        {t:"Reignition / flashover potential after a knockdown:",tag:"PENDING-ENGINEER"}]},
      choices:[
        {id:"a",t:"The fire is knocked down and you can see now — advance the crew in.",trap:true},
        {id:"b",t:"The visible fire being out does not clear the read: fast dark smoke still banked at the ceiling means heat and unburned fuel are still up there. Cool the upper layer and keep reading the smoke before advancing.",best:true},
        {id:"c",t:"Advance, but keep a hoseline ready in case it lights up again.",trap:true},
        {id:"d",t:"Hold — I want a thermal read of the upper layer before I put the crew under it.",limit:true}],
      reveal:{heading:"What the smoke was telling you",
        hidden:"Knocking down the visible fire turns off the light, and the absence of flame reads as safety. But the smoke is still talking: fast, dark, banked smoke at the ceiling is a hot, fuel-rich upper layer that can flash or reignite the moment it gets a little more air or heat. The flame went out; the danger did not.",
        bestSays:"Cooling the upper layer and continuing to read the smoke (B), or holding for a thermal read before advancing under it (D), is the sound call. 'The fire is out, we can see' is the same look-away-from-the-light reflex wearing a calmer face.",
        trapSays:"Advancing because the visible fire is down feels like progress you earned. It is the trap in its quietest form: the flame is the light, and its absence is not the same as the smoke being safe. The banked dark smoke overhead is the read, and it still says danger.",
        note:"PENDING-ENGINEER: the post-knockdown reignition / flashover potential for these conditions is a fire-dynamics figure the research authority must author. The case names the read, not the number."},
      calib:{soundIds:["b","d"],
        highConfWrong:"You were sure it was safe to advance because the flame was down. That is the exact certainty the look-away reflex produces — the eye trusts the absent light and ignores the banked smoke that can still flash.",
        lowConfRight:"You held or cooled first but were not fully sure — right, because a knockdown genuinely does not guarantee the upper layer is safe. The doubt was well placed.",
        highConfRight:"Sound and sure. A hot banked smoke layer overhead is a read you can trust even after the flame is knocked down.",
        lowConfWrong:"Wrong call, loosely held — let the doubt keep your eye on the smoke, not the missing flame."}}],
  closing:{heading:"What this case can and cannot teach you",
    body:"You just read smoke through three moments where the flame lied and the smoke told the truth. The lesson is the reflex: look away from the light. Volume, velocity, density, color — the smoke predicts the fire's next move, and the visible flame is the distraction that pulls your eye off the read. What this case cannot teach is the fireground itself — heat on your neck, air management, the feel of a floor under load. No screen can, and this is not certification.",
    ceiling:"The read that keeps you alive is the humble one: when the smoke says a compartment is about to flash and part of you wants to push anyway, calling it — holding, cooling, coordinating the vent — is not slow. It is the whole skill."}};

const CASES={"nist-compartment-2026":SMOKE};const ACTIVE="nist-compartment-2026";
const C=CASES[ACTIVE];const answers={};const notes={};let order=[];let idx=0;
const CONFLABEL={low:"Not sure",med:"Fairly sure",high:"Very sure"};
const screens=document.getElementById('screens');
function el(html){const d=document.createElement('div');d.innerHTML=html.trim();return d.firstElementChild;}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function initials(name){const p=String(name||'').trim().split(/\s+/).filter(Boolean);if(!p.length)return '—';return (p[0][0]+(p.length>1?p[p.length-1][0]:'')).toUpperCase();}
function knownBlock(k){return`<div class="known"><h3>${k.title}</h3><ul>${k.items.map(i=>`<li>${i.t}<span class="tag ${i.tag.indexOf('PENDING')===0?'pend':''}">${i.tag}</span></li>`).join('')}</ul></div>`;}
function reviewBlock(screenKey){return`<div class="review" data-review="${screenKey}"><h3>Reviewer note (optional)</h3><p>One quick verdict, then anything you would tell me. Your note routes to the seat that owns it.</p><div class="verds" role="group" aria-label="Verdict for this screen"><button class="v-good" data-v="works" aria-pressed="false">Works</button><button class="v-bad" data-v="feel" aria-pressed="false">Does not feel real</button><button class="v-bad" data-v="fact" aria-pressed="false">Wrong fact</button><button class="v-bad" data-v="frame" aria-pressed="false">Frame off</button><button class="v-bad" data-v="source" aria-pressed="false">Needs a source</button><button class="v-bad" data-v="score" aria-pressed="false">Scoring off</button><button class="v-bad" data-v="access" aria-pressed="false">Hard to read</button></div><label class="skip" for="rv-${screenKey}">Your note</label><textarea id="rv-${screenKey}" placeholder="Type here — plain language. What would a firefighter say?"></textarea><p class="seat-hint" data-hint="${screenKey}"></p></div>`;}
function screenHome(){return`<section class="stage on" id="s0" aria-labelledby="s0h"><div class="art" role="img" aria-label="${C.openArt.label}">${C.openArt.svg}</div><p class="kicker">${C.kicker}</p><h1 id="s0h">${C.title}</h1><p class="sub">${C.subtitle}</p><div class="disclaimer">This is a <span class="word">calibration</span> exercise, not certification. It trains how to read smoke and reason under uncertainty — it cannot teach the hand skills of the fireground, and it does not qualify anyone to do this work.</div><div class="btnrow"><button class="btn" data-go="first">Begin the case</button><button class="btn ghost" data-go="hub">Facilitator mode</button></div><p class="credit">Private and offline. Nothing you enter leaves this page unless you export it. Reviewer: ${C.reviewer}.</p></section>`;}
function screenTurn(turn){return`<section class="stage" id="${turn.id}" aria-labelledby="${turn.id}h"><p class="prog">${turn.prog}</p><div class="art" role="img" aria-label="${turn.art.label}">${turn.art.svg}</div><p class="prompt" id="${turn.id}h">${turn.prompt}</p>${knownBlock(turn.known)}<div class="choices" role="group" aria-label="Your read">${turn.choices.map(c=>`<button class="choice" data-choice="${c.id}" aria-pressed="false">${c.t}</button>`).join('')}</div><div class="conf" data-conf hidden><h3>How sure are you?</h3><p>Before you see the record — how confident is this read?</p><div class="row" role="group" aria-label="Confidence"><button data-cf="low" aria-pressed="false">Not sure</button><button data-cf="med" aria-pressed="false">Fairly sure</button><button data-cf="high" aria-pressed="false">Very sure</button></div></div><div class="btnrow"><button class="btn" data-commit="${turn.id}" disabled>Commit and meet the record</button></div><div class="reveal hidden" data-reveal="${turn.id}"></div></section>`;}
function screenClose(){return`<section class="stage" id="close" aria-labelledby="closeh"><p class="prog">The record</p><h2 id="closeh">${C.closing.heading}</h2><p class="sub">${C.closing.body}</p><div class="known"><h3>The habit that keeps you alive</h3><ul><li>${C.closing.ceiling}</li></ul></div>${reviewBlock('closing')}<div class="export"><h3>Export your review</h3><p>This gathers every verdict and note you left, routed to the right panel seat, into one block. Copy it and paste it back into the project — it becomes the Hand seat's record.</p><textarea id="exportBox" readonly aria-label="Your exportable review block"></textarea><div class="btnrow"><button class="btn" id="buildExport">Build my review block</button><button class="btn ghost" id="copyExport">Copy to clipboard</button><button class="btn ghost" data-go="hub">Facilitator mode</button></div><p class="note" id="copyNote"></p></div><footer><b>Reading the Smoke</b> — smoke-read calibration case, engine v1. Studio Eyes gated: arithmetic contrast floor + the Pile Panel. Fire-behavior figures tagged, never invented. Scene art authored in the NIST public-domain idiom, tagged for replacement with real NIST stills. Reviewer: ${C.reviewer}.</footer></section>`;}

/* ---- FACILITATOR HUB (officer face): Confluence structure, calibration swapped for ISLOs ---- */
const crewReads=[];let hubDecision=C.turns[0].id;let hubPickCall=null,hubPickConf=null;
function screenHub(){return`<section class="stage" id="hub" aria-labelledby="hubh"><p class="prog">Facilitator mode</p><h2 id="hubh">The crew's calibration</h2><div class="hubintro">Run the case on the screen with your crew, then record each firefighter's read here. The hub plots the crew's calibration — confidence against correctness — so the debrief is the conversation: who was confidently wrong, where the crew's blind spot is. <b>No accounts, no roster stored, nothing leaves this page.</b> Reads are held in memory for this session only and clear when you close the page. Export a session summary to keep.</div>
    <div class="field"><label id="whichlab">Which read are you debriefing?</label><div class="seg" role="group" aria-labelledby="whichlab" id="hubSeg">${C.turns.map(t=>`<button data-dec="${t.id}" aria-pressed="${t.id===hubDecision}">${t.prog}</button>`).join('')}</div></div>
    <div class="field"><label for="hubName">Firefighter (name or initials)</label><input id="hubName" type="text" autocomplete="off" placeholder="e.g. Rodriguez"></div>
    <div class="field"><label id="calllab">Their read</label><div class="seg" role="group" aria-labelledby="calllab" id="hubCalls"></div></div>
    <div class="field"><label id="conflab">Their confidence</label><div class="seg" role="group" aria-labelledby="conflab" id="hubConf"><button data-cf="low" aria-pressed="false">Not sure</button><button data-cf="med" aria-pressed="false">Fairly sure</button><button data-cf="high" aria-pressed="false">Very sure</button></div></div>
    <div class="btnrow"><button class="btn" id="hubAdd" disabled>Add this read</button></div>
    <div id="hubMatrix"></div>
    <div class="export"><h3>Session summary</h3><p>Every read you entered, the calibration spread per decision, and the overconfident-wrong flags — one block Ben keeps and pastes back into the project. Each becomes Hand-seat growth.</p><textarea id="hubExport" readonly aria-label="Session summary block"></textarea><div class="btnrow"><button class="btn" id="hubBuild">Build session summary</button><button class="btn ghost" id="hubCopy">Copy to clipboard</button></div><p class="note" id="hubNote"></p></div>
    <footer><b>Facilitator mode</b> is the officer face — Confluence's assessment structure with calibration as the outcome. This is instrument A (in-room, no data plumbing); the persistent longitudinal hub (B) is a later bolt-on that reads these exported sessions. No score, no streak, no leaderboard — the calibration mirror is the only number, by design.</footer></section>`;}
function turnById(id){return C.turns.find(t=>t.id===id);}
function isSound(decId,call){const t=turnById(decId);return t.calib.soundIds.indexOf(call)>=0;}
function renderHubCalls(){const box=document.getElementById('hubCalls');if(!box)return;const t=turnById(hubDecision);box.innerHTML=t.choices.map(c=>`<button data-call="${c.id}" aria-pressed="${c.id===hubPickCall}">${c.id.toUpperCase()}</button>`).join('');box.querySelectorAll('[data-call]').forEach(b=>b.addEventListener('click',()=>{hubPickCall=b.dataset.call;box.querySelectorAll('[data-call]').forEach(x=>x.setAttribute('aria-pressed',x.dataset.call===hubPickCall));refreshAddBtn();}));}
function refreshAddBtn(){const btn=document.getElementById('hubAdd');const name=(document.getElementById('hubName')||{}).value;btn.disabled=!(name&&name.trim()&&hubPickCall&&hubPickConf);}
function renderMatrix(){const wrap=document.getElementById('hubMatrix');if(!wrap)return;const rows=crewReads.filter(r=>r.decision===hubDecision);const cols=['low','med','high'];const cell=(sound,conf)=>rows.filter(r=>r.sound===sound&&r.conf===conf);
    const td=(sound,conf)=>{const list=cell(sound,conf);const kill=(!sound&&conf==='high');const cls=(sound?'sound':'')+(kill?' killcell':'');const who=list.length?`<span class="who">${list.map(r=>esc(initials(r.name))).join(' · ')}</span>`:'';return `<td class="${cls.trim()}"><span class="n">${list.length}</span>${who}</td>`;};
    const t=turnById(hubDecision);const total=rows.length;const killCount=cell(false,'high').length;
    wrap.innerHTML=`<table class="matrix"><caption>${t.prog} — ${total} read${total===1?'':'s'} recorded</caption><thead><tr><th></th><th>Not sure</th><th>Fairly sure</th><th>Very sure</th></tr></thead><tbody><tr><th>Sound read</th>${td(true,'low')}${td(true,'med')}${td(true,'high')}</tr><tr><th>Off read</th>${td(false,'low')}${td(false,'med')}${td(false,'high')}</tr></tbody></table><p class="killnote"><b>The kill cell</b> is off-read × very-sure — the read that gets a firefighter killed. ${killCount?`<b>${killCount} here.</b> That is the debrief: why were they sure of a read the smoke did not support?`:`None here this time — but it is the cell to watch, not a score to zero out.`}</p>${rows.length?`<ul class="readlist">${rows.map(r=>`<li><span>${esc(r.name)} — read ${r.call.toUpperCase()}, ${CONFLABEL[r.conf]}</span><span class="${r.sound?'snd':'off'}">${r.sound?'sound':'off'}</span></li>`).join('')}</ul>`:''}`;}
function wireHub(){const seg=document.getElementById('hubSeg');if(seg)seg.querySelectorAll('[data-dec]').forEach(b=>b.addEventListener('click',()=>{hubDecision=b.dataset.dec;hubPickCall=null;seg.querySelectorAll('[data-dec]').forEach(x=>x.setAttribute('aria-pressed',x.dataset.dec===hubDecision));renderHubCalls();renderMatrix();refreshAddBtn();}));
    const conf=document.getElementById('hubConf');if(conf)conf.querySelectorAll('[data-cf]').forEach(b=>b.addEventListener('click',()=>{hubPickConf=b.dataset.cf;conf.querySelectorAll('[data-cf]').forEach(x=>x.setAttribute('aria-pressed',x.dataset.cf===hubPickConf));refreshAddBtn();}));
    const name=document.getElementById('hubName');if(name)name.addEventListener('input',refreshAddBtn);
    renderHubCalls();renderMatrix();
    const add=document.getElementById('hubAdd');if(add)add.addEventListener('click',()=>{const nm=name.value.trim();if(!nm||!hubPickCall||!hubPickConf)return;crewReads.push({name:nm,decision:hubDecision,call:hubPickCall,conf:hubPickConf,sound:isSound(hubDecision,hubPickCall)});name.value='';hubPickCall=null;hubPickConf=null;document.querySelectorAll('#hubConf [data-cf]').forEach(x=>x.setAttribute('aria-pressed','false'));renderHubCalls();renderMatrix();refreshAddBtn();name.focus();});
    const build=document.getElementById('hubBuild');if(build)build.addEventListener('click',buildHubExport);
    const copy=document.getElementById('hubCopy');if(copy)copy.addEventListener('click',()=>copyFrom('hubExport','hubNote',buildHubExport));}
function buildHubExport(){const L=[];L.push('=== TSP SMOKE-READ CASE — CREW SESSION SUMMARY ===');L.push('case: '+C.slug);L.push('facilitator instrument: A (in-room, no stored data)');L.push('date: (fill in)');L.push('reads recorded: '+crewReads.length);L.push('');
    C.turns.forEach(t=>{const rows=crewReads.filter(r=>r.decision===t.id);L.push('--- '+t.prog+' ---');if(!rows.length){L.push('  (no reads recorded)');L.push('');return;}const sound=rows.filter(r=>r.sound).length;const kill=rows.filter(r=>!r.sound&&r.conf==='high').length;L.push('  reads: '+rows.length+' | sound: '+sound+' | off: '+(rows.length-sound)+' | KILL-CELL (off + very sure): '+kill);rows.forEach(r=>{L.push('    '+r.name+': read '+r.call.toUpperCase()+', '+CONFLABEL[r.conf]+' -> '+(r.sound?'sound':'OFF')+(!r.sound&&r.conf==='high'?'  <-- kill cell':''));});L.push('');});
    L.push('--- FOR THE STUDIO ---');L.push('Paste back into the Claude project. The kill-cell entries are the priority debrief and');L.push('the Hand-seat growth record. This is instrument A; the persistent hub (B) will one day');L.push('chart these sessions over time to show each firefighter getting less overconfident.');
    document.getElementById('hubExport').value=L.join('\n');document.getElementById('hubNote').textContent='Built. Copy it, then paste into the project.';}

/* ---- shared engine (inherited from the collapse case) ---- */
function build(){screens.innerHTML='';screens.appendChild(el(screenHome()));C.turns.forEach(t=>screens.appendChild(el(screenTurn(t))));screens.appendChild(el(screenClose()));screens.appendChild(el(screenHub()));order=['s0'].concat(C.turns.map(t=>t.id)).concat(['close','hub']);wire();wireHub();show(0);}
const backBtn=document.getElementById('backBtn'),homeBtn=document.getElementById('homeBtn');
function show(i){idx=Math.max(0,Math.min(i,order.length-1));document.querySelectorAll('.stage').forEach(s=>s.classList.remove('on'));const cur=document.getElementById(order[idx]);if(cur)cur.classList.add('on');backBtn.disabled=idx===0;window.scrollTo(0,0);}
function goto(id){const i=order.indexOf(id);if(i>=0)show(i);}
backBtn.addEventListener('click',()=>show(idx-1));homeBtn.addEventListener('click',()=>show(0));
function wire(){screens.querySelectorAll('[data-go]').forEach(b=>b.addEventListener('click',()=>{const g=b.dataset.go;goto(g==='first'?C.turns[0].id:g);}));C.turns.forEach(turn=>{const sec=document.getElementById(turn.id);const conf=sec.querySelector('[data-conf]');const commit=sec.querySelector('[data-commit]');let pickC=null,pickCf=null;sec.querySelectorAll('.choice').forEach(btn=>btn.addEventListener('click',()=>{sec.querySelectorAll('.choice').forEach(x=>x.setAttribute('aria-pressed','false'));btn.setAttribute('aria-pressed','true');pickC=btn.dataset.choice;conf.hidden=false;commit.disabled=!(pickC&&pickCf);}));conf.querySelectorAll('[data-cf]').forEach(btn=>btn.addEventListener('click',()=>{conf.querySelectorAll('[data-cf]').forEach(x=>x.setAttribute('aria-pressed','false'));btn.setAttribute('aria-pressed','true');pickCf=btn.dataset.cf;commit.disabled=!(pickC&&pickCf);}));commit.addEventListener('click',()=>{answers[turn.id]={choiceId:pickC,confidence:pickCf};renderReveal(turn,pickC,pickCf);commit.disabled=true;});});wireReview(document.querySelector('[data-review="closing"]'),'closing');const buildBtn=document.getElementById('buildExport');const copyBtn=document.getElementById('copyExport');if(buildBtn)buildBtn.addEventListener('click',buildExport);if(copyBtn)copyBtn.addEventListener('click',()=>copyFrom('exportBox','copyNote',buildExport));}
function renderReveal(turn,choiceId,cf){const box=document.querySelector(`[data-reveal="${turn.id}"]`);const chosen=turn.choices.find(c=>c.id===choiceId);const sound=turn.calib.soundIds.indexOf(choiceId)>=0;let scoreMsg,miss=!sound;if(sound&&cf==='high')scoreMsg=turn.calib.highConfRight;else if(sound)scoreMsg=turn.calib.lowConfRight;else if(!sound&&cf==='high')scoreMsg=turn.calib.highConfWrong;else scoreMsg=turn.calib.lowConfWrong;box.innerHTML=`<h3>${turn.reveal.heading}</h3><div class="hidden-var"><b>What you could not see:</b> ${turn.reveal.hidden}</div><p>${chosen&&chosen.trap?turn.reveal.trapSays:turn.reveal.bestSays}</p><div class="score ${miss?'miss':''}"><b>Calibration:</b> ${scoreMsg}</div><p style="font-size:15px;color:var(--ink2);margin-top:12px">${turn.reveal.note}</p>${reviewBlock(turn.id)}<div class="btnrow"><button class="btn" data-next="${turn.id}">Continue</button></div>`;box.classList.remove('hidden');wireReview(box.querySelector(`[data-review="${turn.id}"]`),turn.id);const nx=box.querySelector('[data-next]');nx.addEventListener('click',()=>{const i=C.turns.findIndex(t=>t.id===turn.id);if(i<C.turns.length-1)goto(C.turns[i+1].id);else goto('close');});box.scrollIntoView({behavior:'smooth',block:'start'});}
function wireReview(node,key){if(!node)return;const hint=node.querySelector('[data-hint]');const ta=node.querySelector('textarea');node.querySelectorAll('.verds button').forEach(b=>b.addEventListener('click',()=>{node.querySelectorAll('.verds button').forEach(x=>x.setAttribute('aria-pressed','false'));b.setAttribute('aria-pressed','true');const v=b.dataset.v;notes[key]=Object.assign({},notes[key]||{},{verdict:v,text:ta.value});if(hint)hint.textContent=SEATS[v]?SEATS[v].hint:'';}));ta.addEventListener('input',()=>{notes[key]=Object.assign({},notes[key]||{},{text:ta.value});});}
function buildExport(){const lines=[];lines.push('=== TSP SMOKE-READ CASE — REVIEWER FEEDBACK ===');lines.push('case: '+C.slug);lines.push('reviewer: '+C.reviewer);lines.push('date: (fill in)');lines.push('');lines.push('--- READS ---');C.turns.forEach((t,i)=>{const a=answers[t.id];if(a){const ch=t.choices.find(c=>c.id===a.choiceId);const sound=t.calib.soundIds.indexOf(a.choiceId)>=0?'sound':'off';lines.push('R'+(i+1)+': chose "'+(ch?ch.t.slice(0,60):a.choiceId)+'..." | confidence='+a.confidence+' | read='+sound);}else{lines.push('R'+(i+1)+': (not answered)');}});lines.push('');lines.push('--- NOTES, ROUTED TO SEATS ---');const keys=Object.keys(notes);if(!keys.length){lines.push('(no notes left)');}keys.forEach(k=>{const n=notes[k];if(!n)return;const seat=n.verdict&&SEATS[n.verdict]?SEATS[n.verdict].seat:'(no verdict)';const txt=(n.text||'').trim();if(n.verdict||txt){lines.push('['+k+'] -> '+seat+' | verdict='+(n.verdict||'—'));if(txt)lines.push('    note: '+txt);}});lines.push('');lines.push('--- FOR THE STUDIO ---');lines.push('Paste this block back into the Claude project. Each note becomes an attributed');lines.push('heuristic for its seat (Studio Eyes Layer 2 growth). PENDING figures still owed');lines.push('before any trainee ship.');document.getElementById('exportBox').value=lines.join('\n');document.getElementById('copyNote').textContent='Built. Copy it, then paste into the project.';}
function copyFrom(boxId,noteId,builder){const box=document.getElementById(boxId);if(!box.value){builder();}box.select();try{if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(box.value).then(function(){document.getElementById(noteId).textContent='Copied. Paste it into the project.';},function(){document.execCommand('copy');document.getElementById(noteId).textContent='Selected and copied — paste into the project.';});}else{document.execCommand('copy');document.getElementById(noteId).textContent='Selected and copied — paste into the project.';}}catch(e){document.getElementById(noteId).textContent='Select the text above and copy it manually.';}}
const cbtn=document.getElementById('comfortBtn');let warm=false;cbtn.addEventListener('click',()=>{warm=!warm;document.body.classList.toggle('warm',warm);cbtn.textContent=warm?'Comfort: Warm dark':'Comfort: Default';});
build();
</script>
</body>
